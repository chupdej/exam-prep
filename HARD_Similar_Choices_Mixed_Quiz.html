<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>ข้อยาก — ตัวเลือกใกล้เคียง</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #6e3b89 0%, #4a1f73 100%);
    min-height: 100vh;
    padding: 16px;
    color: #1a1a1a;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  header {
    background: linear-gradient(135deg, #5b2a8a 0%, #3d1761 100%);
    color: white;
    padding: 24px 28px;
  }
  header h1 { font-size: 1.5rem; margin-bottom: 6px; }
  header .sub { opacity: 0.85; font-size: 0.95rem; }
  header .back {
    display: inline-block;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 0.85rem;
    margin-bottom: 10px;
  }
  header .back:hover { color: white; }
  .stats {
    display: flex;
    gap: 16px;
    padding: 16px 28px;
    background: #faf7fc;
    border-bottom: 1px solid #e9e2ef;
    flex-wrap: wrap;
  }
  .stat { flex: 1; min-width: 80px; text-align: center; }
  .stat .num { font-size: 1.5rem; font-weight: 700; color: #5b2a8a; }
  .stat .num.correct { color: #2e7d32; }
  .stat .num.wrong { color: #c62828; }
  .stat .label { font-size: 0.72rem; text-transform: uppercase; color: #666; margin-top: 2px; letter-spacing: 0.5px; }
  .progress-wrap { padding: 0 28px 16px; background: #faf7fc; }
  .progress-bar { height: 8px; background: #e9e2ef; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #5b2a8a, #c294e3); width: 0%; transition: width 0.4s ease; }
  main { padding: 28px; }
  .question-card { animation: slideIn 0.4s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .qnum { display: inline-block; background: #5b2a8a; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }
  .qnum.hard { background: #d84315; }
  .subj-tag { display: inline-block; background: #f0e6f6; color: #5b2a8a; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; margin-left: 6px; }
  .question { font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; color: #1a1a1a; }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; border: 2px solid #e0d6e8; border-radius: 10px;
    background: white; cursor: pointer; transition: all 0.2s;
    text-align: left; width: 100%; font-family: inherit;
    font-size: 0.98rem; line-height: 1.5; color: #1a1a1a;
  }
  .choice:hover:not(:disabled) { border-color: #5b2a8a; background: #faf7fc; transform: translateX(2px); }
  .choice:disabled { cursor: default; }
  .choice .letter {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: #e9e2ef; color: #5b2a8a; display: inline-flex;
    align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;
  }
  .choice.correct { border-color: #2e7d32; background: #e8f5e9; }
  .choice.correct .letter { background: #2e7d32; color: white; }
  .choice.wrong { border-color: #c62828; background: #ffebee; }
  .choice.wrong .letter { background: #c62828; color: white; }
  .feedback {
    margin-top: 18px; padding: 14px 16px; border-radius: 10px;
    display: none; animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .feedback.show { display: block; }
  .feedback.correct { background: #e8f5e9; border-left: 4px solid #2e7d32; color: #1b5e20; }
  .feedback.wrong { background: #ffebee; border-left: 4px solid #c62828; color: #b71c1c; }
  .feedback strong { display: block; margin-bottom: 4px; font-size: 0.95rem; }
  .controls { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; }
  button.btn {
    padding: 12px 22px; border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .btn-primary { background: #5b2a8a; color: white; }
  .btn-primary:hover { background: #3d1761; transform: translateY(-1px); }
  .btn-primary:disabled { background: #b8a4cc; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #f0e6f6; color: #5b2a8a; }
  .btn-secondary:hover { background: #e0d0ee; }
  
  /* Login screen */
  .login-screen { padding: 40px 28px; text-align: center; }
  .login-screen .emoji { font-size: 3.5rem; margin-bottom: 12px; }
  .login-screen h2 { color: #5b2a8a; font-size: 1.5rem; margin-bottom: 8px; }
  .login-screen .desc { color: #666; margin-bottom: 28px; }
  .login-form { max-width: 360px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .login-form input {
    padding: 14px 16px; border: 2px solid #e0d6e8; border-radius: 10px;
    font-size: 1rem; font-family: inherit; outline: none; transition: border 0.2s;
  }
  .login-form input:focus { border-color: #5b2a8a; }
  .login-form .error { color: #c62828; font-size: 0.9rem; min-height: 1.2em; }
  
  /* End screen */
  .end-screen { padding: 32px 20px; }
  .end-header { text-align: center; margin-bottom: 28px; }
  .end-header .big-emoji { font-size: 4rem; margin-bottom: 8px; }
  .end-header h2 { color: #5b2a8a; font-size: 1.6rem; margin-bottom: 8px; }
  .end-header .name { color: #666; font-size: 1rem; margin-bottom: 16px; }
  .end-score { font-size: 3.5rem; font-weight: 700; color: #5b2a8a; line-height: 1; }
  .end-pct { font-size: 1.5rem; color: #5b2a8a; margin-top: 6px; }
  .end-message { font-size: 1rem; color: #666; margin-top: 12px; }
  .meme-box { text-align: center; margin: 24px auto 0; max-width: 450px; }
  .meme-box img {
    max-width: 100%; max-height: 320px; border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: block; margin: 0 auto;
  }
  .meme-box .meme-caption {
    margin-top: 10px; font-size: 0.95rem; color: #5b2a8a; font-style: italic;
  }
  .sync-status {
    margin: 20px auto; max-width: 400px; padding: 12px 16px;
    border-radius: 8px; font-size: 0.9rem; text-align: center;
  }
  .sync-status.pending { background: #fff8e1; color: #f57c00; }
  .sync-status.ok { background: #e8f5e9; color: #2e7d32; }
  .sync-status.err { background: #ffebee; color: #c62828; }
  
  .wrong-list { margin-top: 28px; }
  .wrong-list h3 {
    color: #c62828; font-size: 1.15rem; margin-bottom: 14px;
    padding-bottom: 8px; border-bottom: 2px solid #fde2e2;
  }
  .wrong-item {
    background: #fafafa; border-left: 4px solid #c62828;
    padding: 14px 16px; margin-bottom: 12px; border-radius: 8px;
  }
  .wrong-item .wq {
    font-weight: 600; color: #1a1a1a; margin-bottom: 8px; line-height: 1.5;
  }
  .wrong-item .wq-num {
    display: inline-block; background: #c62828; color: white;
    padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; margin-right: 6px;
  }
  .wrong-item .wq-subj {
    display: inline-block; background: #fff; color: #5b2a8a;
    padding: 2px 8px; border-radius: 6px; font-size: 0.72rem;
    border: 1px solid #e0d6e8; margin-right: 6px;
  }
  .wrong-item .ans-row { font-size: 0.92rem; line-height: 1.5; margin-top: 4px; }
  .wrong-item .your-ans { color: #c62828; }
  .wrong-item .correct-ans { color: #2e7d32; font-weight: 600; }
  .no-wrong {
    text-align: center; padding: 30px; background: #e8f5e9;
    border-radius: 12px; color: #1b5e20; font-size: 1.05rem;
  }
  
  footer { text-align: center; padding: 16px; background: #faf7fc; color: #888; font-size: 0.8rem; border-top: 1px solid #e9e2ef; }
  @media (max-width: 600px) {
    body { padding: 8px; }
    main { padding: 20px; }
    header { padding: 20px; }
    header h1 { font-size: 1.25rem; }
    .question { font-size: 1rem; }
    .choice { padding: 12px 14px; font-size: 0.92rem; }
    .stats { padding: 12px 16px; gap: 6px; }
    .stat .num { font-size: 1.2rem; }
    .end-score { font-size: 2.8rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <a class="back" href="index.html">← เลือกวิชาอื่น</a>
    <h1>ข้อยาก — ตัวเลือกใกล้เคียง</h1>
    <div class="sub">รวมข้อที่ตัวเลือกใกล้เคียงกัน — รวม <span id="totalQ">0</span> ข้อ</div>
  </header>
  <div id="content"></div>
  <footer>เฉลยทันทีต่อข้อ • ทำซ้ำได้ไม่จำกัด • คะแนนเก็บอัตโนมัติ</footer>
</div>

<script>
const QUESTIONS = [{"n": 2, "q": "What does AOCR stand for in the CCH section of abbreviations and definitions?", "a": "Air Operator Crew Resource", "b": "Air Operator Control Reference", "c": "Air Operator Control Resource", "d": "Air Operator Certificate Requirements", "correct": "D", "subject": "QAB_Rules_and_Regulations"}, {"n": 4, "q": "What does FCOM stand for?", "a": "First Class Operation Manual", "b": "First Class Operating Manual", "c": "Flight Crew Operating Manual", "d": "Flight Crew Operate Management", "correct": "C", "subject": "QAB_Rules_and_Regulations"}, {"n": 7, "q": "What does PHM stand for in the CCH section of abbreviations and definitions?", "a": "Passenger Handbook Manual", "b": "Passenger Handle Manual", "c": "Passenger Handling Manual", "d": "Passenger Service Handbook", "correct": "C", "subject": "QAB_Rules_and_Regulations"}, {"n": 9, "q": "If a cabin crew member is found to have a BMI that exceeds the criteria, the crew member must improve the BMI to achieve the requirement within ___ days. (CCH 2.7)", "a": "30", "b": "45", "c": "60", "d": "90", "correct": "C", "subject": "QAB_Rules_and_Regulations"}, {"n": 11, "q": "What is the code for LATE ACTIVITY? (CCH 2.3.1)", "a": "L11", "b": "L12", "c": "L13", "d": "L18", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 12, "q": "What is the code for STANDBY UNAVAILABLE? (CCH 2.3.1)", "a": "L11", "b": "L12", "c": "L13", "d": "L18", "correct": "C", "subject": "QAB_Rules_and_Regulations"}, {"n": 13, "q": "What is the code for REFUSED TO FLY? (CCH 2.3.1)", "a": "L18", "b": "L19", "c": "L20", "d": "L21", "correct": "A", "subject": "QAB_Rules_and_Regulations"}, {"n": 14, "q": "What is the code for SICK AFTER CHECK-IN? (CCH 2.3.1)", "a": "L18", "b": "L19", "c": "L20", "d": "L21", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 15, "q": "What is the code for MISSED FLIGHT AT LINE STATION? (CCH 2.3.1)", "a": "L18", "b": "L19", "c": "L20", "d": "L21", "correct": "D", "subject": "QAB_Rules_and_Regulations"}, {"n": 16, "q": "What is the code for SICK STANDBY? (CCH 2.3.1)", "a": "L21", "b": "L22", "c": "L23", "d": "L24", "correct": "C", "subject": "QAB_Rules_and_Regulations"}, {"n": 17, "q": "What is the code for DIRECT TO AIRCRAFT? (CCH 2.3.1)", "a": "L21", "b": "L22", "c": "L23", "d": "L24", "correct": "D", "subject": "QAB_Rules_and_Regulations"}, {"n": 18, "q": "What is the code for SICK AFTER ASSIGNED FLIGHT WITHIN 24 HRS. BEFORE SCHEDULED DEPARTURE TIME? (CCH Bulletin01/2023)", "a": "L24", "b": "L25", "c": "L26", "d": "L27", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 19, "q": "What is the code for SICK LESS THAN 3 HOURS BEFORE SCHEDULED DEPARTURE TIME? (CCH 2.3.1)", "a": "L28", "b": "L29", "c": "L30", "d": "L31", "correct": "A", "subject": "QAB_Rules_and_Regulations"}, {"n": 20, "q": "What is the code for MISSED BRIEFING? (CCH 2.3.1)", "a": "L30", "b": "L31", "c": "L32", "d": "L33", "correct": "C", "subject": "QAB_Rules_and_Regulations"}, {"n": 21, "q": "What is the code for MISSED CHECK-IN? (CCH 2.3.1)", "a": "L30", "b": "L31", "c": "L32", "d": "L33", "correct": "D", "subject": "QAB_Rules_and_Regulations"}, {"n": 22, "q": "What is the code for FAILURE TO UPDATE DOCUMENTS? (CCH 2.3.1)", "a": "L70", "b": "L71", "c": "L72", "d": "L73", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 23, "q": "What is the code for INCOMPLETE DOCUMENT? (CCH 2.3.1)", "a": "L70", "b": "L71", "c": "L72", "d": "L73", "correct": "D", "subject": "QAB_Rules_and_Regulations"}, {"n": 24, "q": "A cabin crew must verify their own absence history and penalty codes (if applicable) by accessing the ICARE system and contact QA-B to settle the case by themselves within ___ days.", "a": "15", "b": "30", "c": "45", "d": "60", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 25, "q": "What is the code for INFLIGHT COMMENDATION? (CCH 2.3.2)", "a": "L95", "b": "L96", "c": "L97", "d": "L98", "correct": "C", "subject": "QAB_Rules_and_Regulations"}, {"n": 26, "q": "What is the code for DIRECT COMMENDATION? (CCH 2.3.2)", "a": "L95", "b": "L96", "c": "L97", "d": "L98", "correct": "D", "subject": "QAB_Rules_and_Regulations"}, {"n": 27, "q": "What is the code for MATERNITY LEAVE (WITH PAY)? (CCH Bulletin01/2023)", "a": "Z41", "b": "Z51", "c": "Z61", "d": "Z71", "correct": "D", "subject": "QAB_Rules_and_Regulations"}, {"n": 28, "q": "Upon her delivery date, female cabin crew must inform QA immediately or within___ days by phone. (CCH Bulletin01/2023)", "a": "3", "b": "5", "c": "7", "d": "14", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 29, "q": "What is the code for PRIESTHOOD LEAVE? (CCH 2.3.3)", "a": "Z71", "b": "Z81", "c": "Z91", "d": "Z93", "correct": "C", "subject": "QAB_Rules_and_Regulations"}, {"n": 30, "q": "The requisition period for Priesthood Leave (male) should not exceed ____ days. (CCH 2.3.3)", "a": "90", "b": "120", "c": "180", "d": "210", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 31, "q": "A buddhist female cabin crew may also request for religious ascetic leave up to___days? (CCH 2.3.3)", "a": "90", "b": "120", "c": "180", "d": "210", "correct": "A", "subject": "QAB_Rules_and_Regulations"}, {"n": 32, "q": "A Muslim cabin crew who has been working with THAI for 2 years and has never performed Muslim Pilgrimage (Hajj) may apply for a leave which the requisition should not exceed ____ days. (CCH 2.3.3)", "a": "90", "b": "120", "c": "180", "d": "210", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 33, "q": "What is the code for Temporary Off Duty/ Pending Approval?", "a": "L33", "b": "L34", "c": "L35", "d": "L36", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 35, "q": "In the event of violation that is not severe enough to result in a salary deduction, the staff will be suspended without pay for no more than___days. (CCH 2.5)", "a": "5", "b": "7", "c": "14", "d": "21", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 36, "q": "All crew members must hold a passport validity of at least ____days before leaving the country.", "a": "90", "b": "120", "c": "150", "d": "180", "correct": "D", "subject": "QAB_Rules_and_Regulations"}, {"n": 38, "q": "Any changes made to the details on a passport must be notified to OP-1 in an appropriate time which is ____ hours for the flight to Australia.", "a": "24", "b": "48", "c": "72", "d": "96", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 40, "q": "Crew checked baggage is allowed to load with the weight that should not exceed___kilograms.", "a": "15", "b": "18", "c": "20", "d": "24", "correct": "C", "subject": "QAB_Rules_and_Regulations"}, {"n": 41, "q": "According to the ____ special meal codes, SPML can be ordered only for health and religious reasons. (CCH Bulletin01/ 2023)", "a": "ICAO", "b": "IATA", "c": "AOCR", "d": "FAA", "correct": "B", "subject": "QAB_Rules_and_Regulations"}, {"n": 43, "q": "Reimbursement of the physical examination charge must be submitted no later than___days after after the issuance date. (CCH 2.6)", "a": "120", "b": "140", "c": "160", "d": "180", "correct": "D", "subject": "QAB_Rules_and_Regulations"}, {"n": 49, "q": "If CA Kimberly would like to know the right position to pin the Wings Name Badge, which manual contains the guidelines?", "a": "PSM", "b": "CCGI", "c": "CCM", "d": "CCGG", "correct": "D", "subject": "QAB_Rules_and_Regulations"}, {"n": 53, "q": "What are the BMI (Body Mass Index) limitations for TG cabin crew? (CCGG 4/ REV.7)", "a": "Female shall not exceed 25 and male shall not exceed 27.5", "b": "Female shall be 25 and male shall be 27", "c": "Female shall not exceed 27.5 and male shall not exceed 25", "d": "Female shall not exceed 25.5 and male shall not exceed 27.5", "correct": "A", "subject": "QAB_Rules_and_Regulations"}, {"n": 1, "q": "Choose the CORRECT statement regarding cabin crew assigned station. (CCM 1.8.2)", "a": "Required cabin crew shall occupy the cabin crew assigned station or assigned passenger seat for takeoff and landing", "b": "Required cabin crew shall occupy the cabin crew assigned station for takeoff and landing", "c": "Extra cabin crew shall occupy only the assigned passenger seat for takeoff and landing", "d": "Required cabin crew shall occupy passenger seat for takeoff and landing", "correct": "B", "subject": "QAC_Safety_and_Security"}, {"n": 6, "q": "In case you find any discrepancy in the CCM Part 1, which function is the most suitable you must inform?(CCM 0.1.7)", "a": "QA", "b": "QA-A", "c": "QA-B", "d": "QA-C", "correct": "D", "subject": "QAC_Safety_and_Security"}, {"n": 9, "q": "Which of the following documents concerning the Unruly/Disruptive Passengers? (CCM 7.1.10)", "a": "Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice and AVSEC Form 10", "b": "Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice and Witness Form", "c": "Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice and AVSEC Form 02", "d": "Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice, Witness Form and AVSEC Form 06.", "correct": "B", "subject": "QAC_Safety_and_Security"}, {"n": 10, "q": "What shall be done (in sequence) in case there is a discrepancy of number of transit/landing passengers occurs when transit passenger onboard during transit stop? (CCM 2.39.4)", "a": "PA reminding landing passengers to disembark, Passenger headcount, Passport and boarding pass check", "b": "PA reminding landing passengers to disembark, Passenger headcount, Passengers belongings identification", "c": "PA reminding landing passengers to disembark, Passport and boarding pass check, Passenger headcount", "d": "PA reminding landing passengers to disembark, Passengers belongings identification, Passport and boarding pass check.", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 14, "q": "In order to avoid any detriment to a crew member performance, opportunities to consume a meal shall be arranged when the flight duty period exceeds __ (CCM 1.7.2.1)", "a": "7 hours", "b": "6 hours", "c": "5 hours", "d": "4 hours", "correct": "C", "subject": "QAC_Safety_and_Security"}, {"n": 23, "q": "Flight duty periods may be extended in such unforeseen operational circumstances by no more than __.(CCM 1.7.6.3)", "a": "No extension allowed", "b": "5 hours", "c": "4 hours", "d": "3 hours", "correct": "D", "subject": "QAC_Safety_and_Security"}, {"n": 24, "q": "CCM Part 1 is distributed only in the digital format and can be accessed through _____. (CCM 0.1.7)", "a": "Operations eLibrary and iCARE website", "b": "Operations eLibrary and THAIsphere website", "c": "Operations eLibrary and TGIT website", "d": "Operations eLibrary and Cabin Crew Handbook", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 29, "q": "You are requested the facility of using a bassinet from passenger, you can provide it to the passenger with _____.(CCM 2.5.4.5)", "a": "An infant with 6.7 kilograms weight", "b": "An infant with 65 inches height", "c": "An infant with 68 centimeters height", "d": "An infant with 6.7 months age", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 32, "q": "Which type of passenger that can be accepted only one in economy class cabin in all aircraft type?(CCM 2.5.5.1.2)", "a": "Sick passenger traveling with escort", "b": "Sick passenger traveling without escort", "c": "Stretcher passenger", "d": "Wheelchair passenger traveling without escort", "correct": "C", "subject": "QAC_Safety_and_Security"}, {"n": 33, "q": "Which one is defined as passenger who cannot ascend/descend steps but is able to make own way to/from cabin seat, requires wheelchair for distance to/from aircraft, must be carried up/down steps?(CCM 2.5.6.1)", "a": "Passenger with type of WCHR", "b": "Passenger with type of WCHS", "c": "Passenger with type of WCHC", "d": "Passenger with type of WCHP", "correct": "B", "subject": "QAC_Safety_and_Security"}, {"n": 35, "q": "Which is the embarkation and disembarkation procedure for DEPAs?(CCM 2.5.9.5)", "a": "Board the aircraft and disembark after normal passengers", "b": "Board the aircraft and disembark the aircraft before normal passengers", "c": "Board the aircraft before other passengers and disembark after all passengers have left the aircraft", "d": "Board the aircraft after other passengers and disembark before all passengers have left the aircraft", "correct": "C", "subject": "QAC_Safety_and_Security"}, {"n": 39, "q": "During the flight you find that a placard is not legible, you shall ___________.(CCM 2.21)", "a": "Report to CIC for entry in the Technical Log. PIC has to sign the Technical Log", "b": "Report to CIC for entry in the Technical Log. PIC does not have to sign the Technical Log", "c": "Report to CIC for entry in the Cabin Log. PIC has to sign the Cabin Log", "d": "Report to CIC for entry in the Cabin Log. PIC does not have to sign the Cabin Log", "correct": "D", "subject": "QAC_Safety_and_Security"}, {"n": 41, "q": "Before takeoff and landing during final cabin safety check, cabin crew shall _________.(CCM 2.22)", "a": "Check lavatories in the responsible zone vacant and unlock the lavatory door", "b": "Check lavatories in the responsible zone vacant and lock the lavatory door", "c": "Check lavatories in the responsible zone occupied and unlock the lavatory door", "d": "Check lavatories in the responsible zone occupied and lock the lavatory door", "correct": "B", "subject": "QAC_Safety_and_Security"}, {"n": 44, "q": "Before reporting \"STATION XX, EMERGENCY EQUIPMENT CHECK COMPLETED\", which is the CORRECT conditions?(CCM 2.38.1)", "a": "Curtain opened and secured with straps, overhead bins closed, door mode selector in \"DISARM\" or \"MANUAL\"", "b": "Curtain opened and secured with straps, overhead bins opened, door mode selector in \"DISARM\" or \"MANUAL\"", "c": "Curtain closed and secured, overhead bins opened, door mode selector in \"DISARM\" or \"MANUAL\"", "d": "Curtain closed and secured, overhead bins opened, door mode selector in \"ARMED\" or \"AUTOMATIC\"", "correct": "B", "subject": "QAC_Safety_and_Security"}, {"n": 53, "q": "Bracing position for cabin crew AFT facing seat are: _______ (CCM 4.1.4.2.2)", "a": "Seat belt low and tight, shoulder harnesses secured, sit upright, press head, back and arms against backrest, legs apart, feet firmly on floor", "b": "Seat belt low and tight, shoulder harnesses secured, press chin against chest, arms slightly bent, hands rest on seat cushion, legs apart, feet firmly on the floor", "c": "Seat belt low and tight, shoulder harnesses secured, bend fully forward, legs apart, feet firmly on the floor", "d": "Seat belt low and tight, shoulder harnesses secured, head bend forward, place arms on lap, legs apart, feet firmly on the floor", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 54, "q": "The priorities of survival are ___.(CCM 4.4.2)", "a": "Protection, location, water, food", "b": "Protection, location, food, water", "c": "Protection, food, water, location", "d": "Protection, water, food, location", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 55, "q": "Fire requires 3 elements, combined in the right quantities to exist. The 3 elements are__.(CCM 4.5.2)", "a": "Oxygen, heat, fuel", "b": "Oxygen, heat, energy", "c": "Oxygen, heat, gas", "d": "Oxygen, heat, fluid", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 56, "q": "We can use water extinguisher to extinguish _______ fire.(CCM 4.5.3)", "a": "Class A", "b": "Class A and Class B", "c": "Class B and Class C", "d": "Class A and Class C", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 57, "q": "During flight there is a loud bang, together with a rush of air outside while you are serving passengers. There is a full cart with you. You shall________.(CCM 4.6.3.2)", "a": "Brake the cart and wedge them between pas th cables without authorizations from the PIC", "b": "Crew member shall not restrain any passenger either with handcuffs or other cables without authorization from the PIC", "c": "Crew member shall restrain unruly passenger with cables while it is waiting for authorization from the PIC", "d": "Under the Chicago Convention, unruly/disruptive passengers cannot be held in restraint beyond the first stopover", "correct": "B", "subject": "QAC_Safety_and_Security"}, {"n": 65, "q": "According to the Bomb on Board Procedure, if the bomb can be moved, where is the least risk bomb location (LRBL)? (CCM 7.2.5)", "a": "RH AFT Lavatory", "b": "LH AFT Lavatory", "c": "RH AFT Cabin Door", "d": "LH AFT Cabin Door", "correct": "C", "subject": "QAC_Safety_and_Security"}, {"n": 70, "q": "How to ensure that CIC carries his/her required travel documents and manuals?(CCM 2.1.2)", "a": "CIC shows his/her required travel documents and manuals to CSV if applicable", "b": "CIC shows his/her required travel documents and manuals to cabin crew dispatcher", "c": "CIC crosschecks his/her required travel documents and manuals with the Next CIC", "d": "CIC crosschecks his/her required travel documents and manuals with any cabin crew in briefing room", "correct": "C", "subject": "QAC_Safety_and_Security"}, {"n": 72, "q": "Which is the CORRECT answer concerning the restriction in numbers to be carried for the following categories of passengers?(CCM 2.5.2/2.5.3/2.5.5.2)", "a": "1 UM for a child aged between 8-11 years old traveling on C-class", "b": "2 UM for a child aged between 8-11 years old traveling on C-class", "c": "2 YP for a young passenger aged between 12-17 years traveling on C-class", "d": "For sick passenger traveling without escort: not more than 4 in First Class or Business Class", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 73, "q": "If the door re-opening is required after door arming for any reasons, what action will be performed after establishing communication between flight deck, cabin and ground personnel and CIC has been notified?(CCM 2.38.5)", "a": "Doorman opens the door by using 2-man crew concept", "b": "CIC opens the door by using 2-man crew concept", "c": "Doorman and Assist Doorman disarm the door by using 2-man crew concept", "d": "Doorman and Assist Doorman ensure the door is in arm mode before opening the door", "correct": "C", "subject": "QAC_Safety_and_Security"}, {"n": 74, "q": "There is a life vest stowed on board the aircraft in each passenger seat. Which of the following statement is CORRECT concerning the installation of passenger life vest?(CCM 5.4.1)", "a": "The life vest must be stowed properly with a life vest pull strap outside", "b": "The life vest must be stowed properly with a life vest pull strap inside", "c": "The life vest must be stowed properly with a life vest pull strap under the foot rest cover", "d": "The life vest must be stowed properly without a life vest pull strap", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 75, "q": "Where can you find the information about the Standard Operating Procedures regarding Emergency Exit Seats? (CCM/TOC)", "a": "CCM Chapter 2", "b": "CCM Chapter 4", "c": "CCM Chapter 6", "d": "CCM Chapter 7", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 76, "q": "How many blind and/or deaf passengers travels with an escort dog can be accepted on TG flights?(CCM 2.5.7.2)", "a": "A maximum of 2", "b": "A maximum of 5", "c": "A maximum of 10", "d": "No limit", "correct": "D", "subject": "QAC_Safety_and_Security"}, {"n": 77, "q": "Which of the following is the CORRECT answer concerning Fueling/De-fueling when Passengers are Embarking/Disembarking/on Board?(CCM 2.34)", "a": "\"Fasten Seat Belts\" sign: ON, \"No Smoking\" sign: ON", "b": "\"Fasten Seat Belts\" sign: ON, \"No Smoking\" sign: OFF", "c": "\"Fasten Seat Belts\" sign: OFF, \"No Smoking\" sign: ON", "d": "\"Fasten Seat Belts\" sign: OFF, \"No Smoking\" sign: OFF", "correct": "C", "subject": "QAC_Safety_and_Security"}, {"n": 80, "q": "If passenger headcount is required at transit stop with a change of CA, which of the following statement is CORRECT?(CCM 2.39)", "a": "The inbound CA shall conduct a headcount. The outbound CA must conduct an Aircraft Pre-Departure Security Checks or Search", "b": "The inbound CA shall conduct a headcount and an Aircraft Pre-Departure Security Checks or Search", "c": "The outbound CA shall conduct a headcount and an Aircraft Pre-Departure Security Checks or Search", "d": "The ground personnel shall conduct a headcount. The outbound CA must conduct an Aircraft Pre-Departure Security Checks or Search", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 82, "q": "After using portable oxygen bottles, cabin crew must ensure that the pressure must not be lower than ____.(CCM 5.2.1)", "a": "50 PSI", "b": "150 PSI", "c": "180 PSI", "d": "1500 PSI", "correct": "B", "subject": "QAC_Safety_and_Security"}, {"n": 83, "q": "At a transit stop where transit passengers remain on board, if there is only one passenger disembark, no discrepancy in the number of transit/landing passenger found, which statement is CORRECT?(CCM 2.39)", "a": "Cabin crew perform post-flight security check and additional onboard passenger belongings identification", "b": "Cabin crew perform post-flight security check and conduct passenger headcount", "c": "Cabin crew perform post-flight security check and conduct passport and boarding pass check", "d": "Cabin crew perform only post-flight security check without additional procedures", "correct": "A", "subject": "QAC_Safety_and_Security"}, {"n": 84, "q": "Which statement is CORRECT in the event of transit passenger remain on board during transit stop?(CCM 2.39)", "a": "Prior to passenger disembarkation, cabin crew perform passenger belongings identification", "b": "Prior to passenger disembarkation, CIC makes PA requesting passengers to have their boarding passes ready for inspection by ground personnel", "c": "Prior to passenger disembarkation, cabin crew perform passenger headcount procedure", "d": "Prior to passenger disembarkation, cabin crew perform passport and boarding pass check", "correct": "B", "subject": "QAC_Safety_and_Security"}, {"n": 1, "q": "According to A350-900 Working Routine for 10 CAs, which positions are responsible for C/CL?", "a": "1R, X1L, X2L and 2R", "b": "1R, X1L FWD, X2L and 2R", "c": "1R, X1L, X2L and 2L", "d": "1R, X1LAFT, X2L and 2R", "correct": "B", "subject": "QBA_Service_and_Operating_Procedures"}, {"n": 2, "q": "According toA350-900 Working Routine for 9 CAs, which positions are responsible for C/CL? (Ref.A350-900 working routine)", "a": "1R, 2R, X1L FWD", "b": "1R, X1LAFT, X2L and 2L", "c": "1R, X1L FWD, X2L", "d": "1R, X1LAFT, X2L and 2R", "correct": "A", "subject": "QBA_Service_and_Operating_Procedures"}, {"n": 3, "q": "According to B777-300ER (77B) Working Routine for 10 CAs, which positions are responsible for C/CL? (Ref.B777-300ER working routine)", "a": "1R, 2R, 3L, and X1L", "b": "1R, 2R, 3R, and 4L", "c": "1R, X1L, 2R and 2L", "d": "1R, 2R, X1L and 4L", "correct": "B", "subject": "QBA_Service_and_Operating_Procedures"}, {"n": 4, "q": "According to B777-300ER (77B) Working Routine for 11 CAs, which positions are responsible for C/CL? (Ref.B777-300ER working routine)", "a": "1R, 2R, X1L and 3R", "b": "1R, 2R, X1L and X2L", "c": "1R, 2R, X1L AFT and 3L", "d": "1R, 2R, X1l FWD and 3R", "correct": "A", "subject": "QBA_Service_and_Operating_Procedures"}, {"n": 5, "q": "According to B777-300ER Working Routine for 12 CAs, which positions are responsible for C/CL? (Ref.B777-300ER working routine)(77B)", "a": "1R, 2R, X1L, 3L and 3R", "b": "1R, 2R, X1L, X2L and 3R", "c": "1R, 2R, X1L, 2L and 3L", "d": "1R, 2R, X1LFWD and 3R", "correct": "B", "subject": "QBA_Service_and_Operating_Procedures"}, {"n": 6, "q": "According to B777-300ER (77B) Working Routine for 13 CAs, which positions are responsible for C/CL? (Ref.B777-300ER wor "CAC", "c": "LLP", "d": "CEC", "correct": "D", "subject": "QBB_Food_and_Beverage"}, {"n": 21, "q": "Which of the following flights does not require a Muslim passenger to order Muslim meals?", "a": "BKK - BOM / KTM / MAA V.V", "b": "BKK - BLR / DAC / MCT V.V", "c": "BKK - ISB / KHI / LHE V.V", "d": "BKK - CCU / CMB / DEL V.V", "correct": "C", "subject": "QBB_Food_and_Beverage"}, {"n": 22, "q": "Which pair of the special meal code is for passengers who are strict vegetarians?", "a": "VJML / VLML", "b": "VGML / VJML", "c": "AVML / VOML", "d": "AVML / VGML", "correct": "B", "subject": "QBB_Food_and_Beverage"}, {"n": 23, "q": "What kind of special meal strictly prohibits the offering of the regular bread rolls?", "a": "DBML", "b": "LFML", "c": "LCML", "d": "GFML", "correct": "D", "subject": "QBB_Food_and_Beverage"}, {"n": 24, "q": "What is the definition of Vegan?", "a": "Vegetarian who consumes vegetables, fruits, nuts and dairy products", "b": "Vegetarian who consumes eggs only.", "c": "Vegetarian who consumes dairy products.", "d": "Vegetarian who avoids all food from the animal kingdom including eggs and dairy products.", "correct": "D", "subject": "QBB_Food_and_Beverage"}, {"n": 31, "q": "What kinds of SPML will be added in 2026 to respond to the dietary needs of passengers? (SI/ October 2025)", "a": "PNML and FFML", "b": "IVML and PFML", "c": "NPML and NFML", "d": "NFML and PFML", "correct": "D", "subject": "QBB_Food_and_Beverage"}, {"n": 34, "q": "What is Prosciutto?", "a": "An Italian sausage", "b": "An Italian ham", "c": "An Italian cheese", "d": "An Italian dressing salad", "correct": "B", "subject": "QBB_Food_and_Beverage"}, {"n": 38, "q": "What does FPML stand for? (SI/ October 2025)", "a": "Fresh fruit plate meal", "b": "Fruit plate meal", "c": "Fresh fruit platter meal", "d": "Fruit platter meal", "correct": "D", "subject": "QBB_Food_and_Beverage"}, {"n": 39, "q": "According to IATA special meal code, what does AVML stand for? (SI/ October 2025)", "a": "Ind  "q": "What is the recommended serving temperature for white wine?", "a": "7-10 degree celcius", "b": "10-13 degree celcius", "c": "13-15 degree celcius", "d": "16-18 degree celcius", "correct": "A", "subject": "QBB_Food_and_Beverage"}];
const IS_HARD = true;
const SUBJECT_CODE = 'HARD';
const SUBJECT_NAME = 'Tricky Set';
const PASSWORD = 'mheenoeysusu';
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzw8A3zMTTAuZQ0f4nf61enc-99OlnHg36D9gDUzKHxR2Z6HdL6sJWUtPiyF5QUy98mTg/exec';

let userName = '';
let order = [];
let cur = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let startTime = null;
let wrongAnswers = []; // {q, userAnswer, correctAnswer}

function $(id) { return document.getElementById(id); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// LOGIN SCREEN
function renderLogin() {
  $('content').innerHTML = `
    <div class="login-screen">
      <div class="emoji">✈️</div>
      <h2>เข้าสู่ระบบ</h2>
      <div class="desc">กรอกข้อมูลก่อนเริ่มทำแบบทดสอบ</div>
      <div class="login-form">
        <input type="text" id="loginName" placeholder="ชื่อเล่น" autocomplete="nickname" />
        <input type="password" id="loginPass" placeholder="รหัสผ่าน" />
        <div class="error" id="loginErr"></div>
        <button class="btn btn-primary" onclick="tryLogin()">เริ่มทำแบบทดสอบ →</button>
      </div>
    </div>`;
  $('totalQ').textContent = QUESTIONS.length;
  // allow Enter key
  ['loginName','loginPass'].forEach(id => {
    $(id).addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  });
  $('loginName').focus();
}

function tryLogin() {
  const name = $('loginName').value.trim();
  const pass = $('loginPass').value;
  const err = $('loginErr');
  if (!name) { err.textContent = 'กรุณากรอกชื่อเล่น'; return; }
  if (name.length < 2) { err.textContent = 'ชื่อเล่นต้องมีอย่างน้อย 2 ตัวอักษร'; return; }
  if (pass !== PASSWORD) { err.textContent = 'รหัสผ่านไม่ถูกต้อง'; return; }
  userName = name;
  startQuiz();
}

// QUIZ
function startQuiz() {
  order = shuffle(QUESTIONS.map((_, i) => i));
  cur = 0;
  correctCount = 0;
  wrongCount = 0;
  wrongAnswers = [];
  startTime = Date.now();
  renderQuizFrame();
  renderQuestion();
}

function renderQuizFrame() {
  $('content').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="num" id="curNum">0</div><div class="label">ข้อ</div></div>
      <div class="stat"><div class="num correct" id="correctNum">0</div><div class="label">ถูก</div></div>
      <div class="stat"><div class="num wrong" id="wrongNum">0</div><div class="label">ผิด</div></div>
      <div class="stat"><div class="num" id="scoreNum">0%</div><div class="label">คะแนน</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    </div>
    <main id="mainArea"></main>`;
}

function updateStats() {
  $('curNum').textContent = cur + 1;
  $('correctNum').textContent = correctCount;
  $('wrongNum').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const pct = total === 0 ? 0 : Math.round((correctCount / total) * 100);
  $('scoreNum').textContent = pct + '%';
  $('progFill').style.width = ((cur) / QUESTIONS.length * 100) + '%';
}

function renderQuestion() {
  if (cur >= QUESTIONS.length) { renderEnd(); return; }
  answered = false;
  const q = QUESTIONS[order[cur]];
  updateStats();
  const subjTag = (IS_HARD && q.subject) ? `<span class="subj-tag">${escapeHtml(q.subject.split('_')[0].replace('QAB','A').replace('QAC','B').replace('QBA','C').replace('QBB','D'))}</span>` : '';
  const qNumCls = IS_HARD ? 'qnum hard' : 'qnum';
  $('mainArea').innerHTML = `
    <div class="question-card">
      <div>
        <span class="${qNumCls}">ข้อ ${cur + 1} / ${QUESTIONS.length}</span>
        ${subjTag}
      </div>
      <div class="question" style="margin-top: 12px;">${escapeHtml(q.q)}</div>
      <div class="choices">
        ${['A','B','C','D'].map(letter => `
          <button class="choice" data-letter="${letter}" onclick="selectAnswer('${letter}')">
            <span class="letter">${letter}</span>
            <span>${escapeHtml(q[letter.toLowerCase()])}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="controls">
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>${cur === QUESTIONS.length - 1 ? 'ดูผลรวม →' : 'ข้อถัดไป →'}</button>
        <button class="btn btn-secondary" onclick="restartQuiz()">เริ่มใหม่</button>
      </div>
    </div>`;
}

function selectAnswer(letter) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[order[cur]];
  const isCorrect = letter === q.correct;
  if (isCorrect) {
    correctCount++;
  } else {
    wrongCount++;
    wrongAnswers.push({
      q: q,
      userAnswer: letter,
      correctAnswer: q.correct,
      qIdx: cur + 1
    });
  }
  document.querySelectorAll('.choice').forEach(btn => {
    btn.disabled = true;
    const l = btn.dataset.letter;
    if (l === q.correct) btn.classList.add('correct');
    else if (l === letter) btn.classList.add('wrong');
  });
  const fb = $('feedback');
  const correctText = q[q.correct.toLowerCase()];
  if (isCorrect) {
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✓ ถูกต้อง!</strong>คำตอบ: ${q.correct}. ${escapeHtml(correctText)}`;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>✗ ผิด</strong>คำตอบที่ถูก: ${q.correct}. ${escapeHtml(correctText)}`;
  }
  $('nextBtn').disabled = false;
  updateStats();
}

function nextQuestion() { cur++; renderQuestion(); }

function restartQuiz() {
  if (confirm('เริ่มใหม่และสุ่มลำดับข้อใหม่?')) startQuiz();
}

function renderEnd() {
  updateStats();
  $('progFill').style.width = '100%';
  const total = QUESTIONS.length;
  const pct = Math.round((correctCount / total) * 100);
  const duration = Math.round((Date.now() - startTime) / 1000);
  let msg, emoji, memeFile;
  if (pct >= 100) { msg = 'BC is calling เต็ม100ได้100 เออ เริ่ด!!!'; emoji = '🏆'; memeFile = 'meme-100.jpg'; }
  else if (pct >= 95) { msg = 'ตัวเเม่ตัวมัมตัวBCมาก เจ๋งแจ่มแจ๋ว'; emoji = '🎉'; memeFile = 'meme-95.jpg'; }
  else if (pct >= 90) { msg = 'หลบหน่อย คนสวยจะเป็นพี่BCเด้อ'; emoji = '🎉'; memeFile = 'meme-90.jpg'; }
  else if (pct >= 80) { msg = 'ผ่านล่ะแม่ ดีจุยด้วย'; emoji = '🎉'; memeFile = 'meme-80.jpg'; }
  else { msg = 'อ่านใหม่ก่อนๆคุณแม่'; emoji = '💪'; memeFile = 'meme-0.jpg'; }
  const memeCaption = emoji + ' ' + msg;
  const memeHtml = `<div class="meme-box"><img src="${memeFile}" alt="meme" onerror="this.parentElement.style.display='none'"></div>`;
  
  const wrongHtml = wrongAnswers.length === 0
    ? `<div class="no-wrong">🌟 ตอบถูกทุกข้อ! ไม่มีข้อให้ทบทวน</div>`
    : `<div class="wrong-list">
        <h3>ข้อที่ตอบผิด (${wrongAnswers.length} ข้อ) — ทบทวนเฉลย</h3>
        ${wrongAnswers.map(w => {
          const correctText = w.q[w.correctAnswer.toLowerCase()];
          const userText = w.q[w.userAnswer.toLowerCase()];
          const subjTag = (IS_HARD && w.q.subject) ? `<span class="wq-subj">${escapeHtml(w.q.subject.split('_')[0].replace('QAB','A').replace('QAC','B').replace('QBA','C').replace('QBB','D'))}</span>` : '';
          return `
            <div class="wrong-item">
              <div class="wq">
                <span class="wq-num">ลำดับที่ ${w.qIdx}</span>${subjTag}
                ${escapeHtml(w.q.q)}
              </div>
              <div class="ans-row your-ans">✗ คุณตอบ: ${w.userAnswer}. ${escapeHtml(userText)}</div>
              <div class="ans-row correct-ans">✓ เฉลย: ${w.correctAnswer}. ${escapeHtml(correctText)}</div>
            </div>
          `;
        }).join('')}
      </div>`;
  
  $('content').innerHTML = `
    <div class="end-screen">
      <div class="end-header">
        <div class="big-emoji">${emoji}</div>
        <h2>${msg}</h2>
        <div class="name">${escapeHtml(userName)} • ใช้เวลา ${duration} วินาที</div>
        <div class="end-score">${correctCount} / ${total}</div>
        <div class="end-pct">${pct}%</div>
      </div>
      ${memeHtml}
      <div id="syncStatus" class="sync-status pending">⏳ กำลังบันทึกคะแนน...</div>
      ${wrongHtml}
      <div class="controls" style="justify-content: center; margin-top: 28px;">
        <button class="btn btn-primary" onclick="restartQuiz()">ทำใหม่ (สุ่มข้อใหม่)</button>
        <a class="btn btn-secondary" href="index.html" style="text-decoration: none; display: inline-flex; align-items: center;">เลือกวิชาอื่น</a>
      </div>
    </div>`;
  
  // Send score to Google Sheet
  submitScore(correctCount, total, pct, duration);
}

function submitScore(score, total, percent, duration) {
  const statusEl = $('syncStatus');
  const payload = {
    name: userName,
    subject: SUBJECT_NAME,
    score: score,
    total: total,
    percent: percent,
    duration: duration
  };
  // Use no-cors mode — Apps Script accepts text/plain without preflight
  fetch(WEBAPP_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  }).then(() => {
    if (statusEl) {
      statusEl.className = 'sync-status ok';
      statusEl.innerHTML = '✓ บันทึกคะแนนเรียบร้อย';
    }
  }).catch(err => {
    if (statusEl) {
      statusEl.className = 'sync-status err';
      statusEl.innerHTML = '⚠️ บันทึกคะแนนไม่สำเร็จ (ตรวจอินเทอร์เน็ต)';
    }
    console.error('Submit error:', err);
  });
}

// Start
renderLogin();
</script>
