<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Service & Operating Procedures</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #6e3b89 0%, #4a1f73 100%);
    min-height: 100vh;
    padding: 16px;
    color: #1a1a1a;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  header {
    background: linear-gradient(135deg, #5b2a8a 0%, #3d1761 100%);
    color: white;
    padding: 24px 28px;
  }
  header h1 { font-size: 1.5rem; margin-bottom: 6px; }
  header .sub { opacity: 0.85; font-size: 0.95rem; }
  header .back {
    display: inline-block;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 0.85rem;
    margin-bottom: 10px;
  }
  header .back:hover { color: white; }
  .stats {
    display: flex;
    gap: 16px;
    padding: 16px 28px;
    background: #faf7fc;
    border-bottom: 1px solid #e9e2ef;
    flex-wrap: wrap;
  }
  .stat { flex: 1; min-width: 80px; text-align: center; }
  .stat .num { font-size: 1.5rem; font-weight: 700; color: #5b2a8a; }
  .stat .num.correct { color: #2e7d32; }
  .stat .num.wrong { color: #c62828; }
  .stat .label { font-size: 0.72rem; text-transform: uppercase; color: #666; margin-top: 2px; letter-spacing: 0.5px; }
  .progress-wrap { padding: 0 28px 16px; background: #faf7fc; }
  .progress-bar { height: 8px; background: #e9e2ef; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #5b2a8a, #c294e3); width: 0%; transition: width 0.4s ease; }
  main { padding: 28px; }
  .question-card { animation: slideIn 0.4s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .qnum { display: inline-block; background: #5b2a8a; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }
  .qnum.hard { background: #d84315; }
  .subj-tag { display: inline-block; background: #f0e6f6; color: #5b2a8a; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; margin-left: 6px; }
  .question { font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; color: #1a1a1a; }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; border: 2px solid #e0d6e8; border-radius: 10px;
    background: white; cursor: pointer; transition: all 0.2s;
    text-align: left; width: 100%; font-family: inherit;
    font-size: 0.98rem; line-height: 1.5; color: #1a1a1a;
  }
  .choice:hover:not(:disabled) { border-color: #5b2a8a; background: #faf7fc; transform: translateX(2px); }
  .choice:disabled { cursor: default; }
  .choice .letter {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: #e9e2ef; color: #5b2a8a; display: inline-flex;
    align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;
  }
  .choice.correct { border-color: #2e7d32; background: #e8f5e9; }
  .choice.correct .letter { background: #2e7d32; color: white; }
  .choice.wrong { border-color: #c62828; background: #ffebee; }
  .choice.wrong .letter { background: #c62828; color: white; }
  .feedback {
    margin-top: 18px; padding: 14px 16px; border-radius: 10px;
    display: none; animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .feedback.show { display: block; }
  .feedback.correct { background: #e8f5e9; border-left: 4px solid #2e7d32; color: #1b5e20; }
  .feedback.wrong { background: #ffebee; border-left: 4px solid #c62828; color: #b71c1c; }
  .feedback strong { display: block; margin-bottom: 4px; font-size: 0.95rem; }
  .controls { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; }
  button.btn {
    padding: 12px 22px; border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .btn-primary { background: #5b2a8a; color: white; }
  .btn-primary:hover { background: #3d1761; transform: translateY(-1px); }
  .btn-primary:disabled { background: #b8a4cc; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #f0e6f6; color: #5b2a8a; }
  .btn-secondary:hover { background: #e0d0ee; }
  
  /* Login screen */
  .login-screen { padding: 40px 28px; text-align: center; }
  .login-screen .emoji { font-size: 3.5rem; margin-bottom: 12px; }
  .login-screen h2 { color: #5b2a8a; font-size: 1.5rem; margin-bottom: 8px; }
  .login-screen .desc { color: #666; margin-bottom: 28px; }
  .login-form { max-width: 360px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .login-form input {
    padding: 14px 16px; border: 2px solid #e0d6e8; border-radius: 10px;
    font-size: 1rem; font-family: inherit; outline: none; transition: border 0.2s;
  }
  .login-form input:focus { border-color: #5b2a8a; }
  .login-form .error { color: #c62828; font-size: 0.9rem; min-height: 1.2em; }
  
  /* End screen */
  .end-screen { padding: 32px 20px; }
  .end-header { text-align: center; margin-bottom: 28px; }
  .end-header .big-emoji { font-size: 4rem; margin-bottom: 8px; }
  .end-header h2 { color: #5b2a8a; font-size: 1.6rem; margin-bottom: 8px; }
  .end-header .name { color: #666; font-size: 1rem; margin-bottom: 16px; }
  .end-score { font-size: 3.5rem; font-weight: 700; color: #5b2a8a; line-height: 1; }
  .end-pct { font-size: 1.5rem; color: #5b2a8a; margin-top: 6px; }
  .end-message { font-size: 1rem; color: #666; margin-top: 12px; }
  .meme-box { text-align: center; margin: 24px auto 0; max-width: 450px; }
  .meme-box img {
    max-width: 100%; max-height: 320px; border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: block; margin: 0 auto;
  }
  .meme-box .meme-caption {
    margin-top: 10px; font-size: 0.95rem; color: #5b2a8a; font-style: italic;
  }
  .sync-status {
    margin: 20px auto; max-width: 400px; padding: 12px 16px;
    border-radius: 8px; font-size: 0.9rem; text-align: center;
  }
  .sync-status.pending { background: #fff8e1; color: #f57c00; }
  .sync-status.ok { background: #e8f5e9; color: #2e7d32; }
  .sync-status.err { background: #ffebee; color: #c62828; }
  
  .wrong-list { margin-top: 28px; }
  .wrong-list h3 {
    color: #c62828; font-size: 1.15rem; margin-bottom: 14px;
    padding-bottom: 8px; border-bottom: 2px solid #fde2e2;
  }
  .wrong-item {
    background: #fafafa; border-left: 4px solid #c62828;
    padding: 14px 16px; margin-bottom: 12px; border-radius: 8px;
  }
  .wrong-item .wq {
    font-weight: 600; color: #1a1a1a; margin-bottom: 8px; line-height: 1.5;
  }
  .wrong-item .wq-num {
    display: inline-block; background: #c62828; color: white;
    padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; margin-right: 6px;
  }
  .wrong-item .wq-subj {
    display: inline-block; background: #fff; color: #5b2a8a;
    padding: 2px 8px; border-radius: 6px; font-size: 0.72rem;
    border: 1px solid #e0d6e8; margin-right: 6px;
  }
  .wrong-item .ans-row { font-size: 0.92rem; line-height: 1.5; margin-top: 4px; }
  .wrong-item .your-ans { color: #c62828; }
  .wrong-item .correct-ans { color: #2e7d32; font-weight: 600; }
  .no-wrong {
    text-align: center; padding: 30px; background: #e8f5e9;
    border-radius: 12px; color: #1b5e20; font-size: 1.05rem;
  }
  
  footer { text-align: center; padding: 16px; background: #faf7fc; color: #888; font-size: 0.8rem; border-top: 1px solid #e9e2ef; }
  @media (max-width: 600px) {
    body { padding: 8px; }
    main { padding: 20px; }
    header { padding: 20px; }
    header h1 { font-size: 1.25rem; }
    .question { font-size: 1rem; }
    .choice { padding: 12px 14px; font-size: 0.92rem; }
    .stats { padding: 12px 16px; gap: 6px; }
    .stat .num { font-size: 1.2rem; }
    .end-score { font-size: 2.8rem; }
  }
</style>
</head>

ance", "d": "In-flight Services Development & Quality Assurance", "correct": "A"}, {"n": 16, "q": "Which function is responsible for working routine?", "a": "BKKQA-B", "b": "BKKQB-B", "c": "BKKQB-A", "d": "BKKQA-A", "correct": "C"}, {"n": 17, "q": "According to the announcement on privileges for passengers upgraded onboard (Ref: QB-A 09JUN25), which of the following statements is correct?", "a": "Passengers upgraded onboard are always entitled to all upgraded class privileges, including meals, lounge access, and frequent flyer points.", "b": "Passengers upgraded onboard will not be eligible for certain upgraded class privileges, but the amenity kit should be offered if available in stock.", "c": "Passengers upgraded onboard will not be offered an amenity kit under any circumstances.", "d": "An amenity kit is provided to the passenger upgraded onboard only on long-haul flights.", "correct": "B"}, {"n": 18, "q": "According to SI (APR 2025), on which routes will the SIRIVANNAVARI branded Amenities Kit be provided in C/CL service?", "a": "BKK-CDG-BKK, BKK-MXP-BKK, BKK-NRT-BKK, BKK-PVG-BKK", "b": "BKK-CDG-BKK, BKK-LHR-BKK, BKK-HND-BKK, BKK-PVG-BKK", "c": "BKK-MXP-BKK, BKK-NRT-BKK, BKK-HKG-BKK, BKK-PVG-BKK", "d": "BKK-CDG-BKK, BKK-MXP-BKK, BKK-LAX-BKK, BKK-NRT-BKK", "correct": "A"}, {"n": 19, "q": "According to ISOP in C/CL, CA must attend to passengers call within____.", "a": "10 Seconds.", "b": "15 Seconds.", "c": "20 Seconds.", "d": "30 Seconds.", "correct": "C"}, {"n": 20, "q": "According to ISOP in C/CL, CA must perform cabin walk around every ____ minutes.", "a": "15-20 Minutes.", "b": "30 Minutes.", "c": "45 Minutes.", "d": "More often.", "correct": "B"}, {"n": 21, "q": "About the Royal Silk welcome drink service, which answer is incorrect?", "a": "Champagne should be the first drink offered during the welcome service before take-off", "b": "Drip mat must not be placed on passenger seat in advance.", "c": "Always show label and mention the name of champagne.", "d": TO LUEM PUA", "b": "DASSAI 39 JUNMAI DAIGINJO", "c": "HORANGI (TIGER) MAKGEOLLI", "d": "BELLINO", "correct": "D"}, {"n": 41, "q": "Which flight offers the size L service? (SI)", "a": "TG677", "b": "TG601", "c": "TG615", "d": "TG217", "correct": "A"}, {"n": 42, "q": "Which destination requires aircraft disinsection spraying after door-close?", "a": "NRT", "b": "CDG", "c": "SYD", "d": "ICN", "correct": "B"}, {"n": 43, "q": "Which of the following destinations is NOT included in the routes that will received the SIRIVANNAVARI Amenities Kit?", "a": "CDG", "b": "NRT", "c": "MXP", "d": "SYD", "correct": "D"}, {"n": 44, "q": "What menu is not a part of the \"Premium Asian Noodles\" project? (ref. Cabin Insight)", "a": "Boat Noodles, braised pork belly", "b": "Boat Noodles, sous vide beef short rib", "c": "Pad Thai Noodles, jumbo crab, bleanded with rich crab roe and crab fat", "d": "Pad Thai Noodles, prawn", "correct": "D"}, {"n": 45, "q": "About the Royal Class welcome drink service, which answer is correct?", "a": "Champagne shall be offered as the first priority beverages.", "b": "The cabin crew may offer a selection of drinks as welcome drink, present on a silver tray.", "c": "Welcome drink is to be served before offering hot towels during boarding.", "d": "Preparing a selection of drinks on ABS tray in advance is permitted.", "correct": "A"}, {"n": 46, "q": "What is the main ingredient of DEVANOM?", "a": "Rice Variety Luem Pua Sticking Rice", "b": "Rice Variety Yamada Nishiki Rice", "c": "Unpolised Brown Rice", "d": "Sangyod Muang Phatthalung Rice", "correct": "A"}];
const IS_HARD = false;
const SUBJECT_CODE = 'QBA';
const SUBJECT_NAME = 'Set C';
const PASSWORD = 'mheenoeysusu';
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzw8A3zMTTAuZQ0f4nf61enc-99OlnHg36D9gDUzKHxR2Z6HdL6sJWUtPiyF5QUy98mTg/exec';

let userName = '';
let order = [];
let cur = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let startTime = null;
let wrongAnswers = []; // {q, userAnswer, correctAnswer}

function $(id) { return document.getElementById(id); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// LOGIN SCREEN
function renderLogin() {
  $('content').innerHTML = `
    <div class="login-screen">
      <div class="emoji">✈️</div>
      <h2>เข้าสู่ระบบ</h2>
      <div class="desc">กรอกข้อมูลก่อนเริ่มทำแบบทดสอบ</div>
      <div class="login-form">
        <input type="text" id="loginName" placeholder="ชื่อเล่น" autocomplete="nickname" />
        <input type="password" id="loginPass" placeholder="รหัสผ่าน" />
        <div class="error" id="loginErr"></div>
        <button class="btn btn-primary" onclick="tryLogin()">เริ่มทำแบบทดสอบ →</button>
      </div>
    </div>`;
  $('totalQ').textContent = QUESTIONS.length;
  // allow Enter key
  ['loginName','loginPass'].forEach(id => {
    $(id).addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  });
  $('loginName').focus();
}

function tryLogin() {
  const name = $('loginName').value.trim();
  const pass = $('loginPass').value;
  const err = $('loginErr');
  if (!name) { err.textContent = 'กรุณากรอกชื่อเล่น'; return; }
  if (name.length < 2) { err.textContent = 'ชื่อเล่นต้องมีอย่างน้อย 2 ตัวอักษร'; return; }
  if (pass !== PASSWORD) { err.textContent = 'รหัสผ่านไม่ถูกต้อง'; return; }
  userName = name;
  startQuiz();
}

// QUIZ
function startQuiz() {
  order = shuffle(QUESTIONS.map((_, i) => i));
  cur = 0;
  correctCount = 0;
  wrongCount = 0;
  wrongAnswers = [];
  startTime = Date.now();
  renderQuizFrame();
  renderQuestion();
}

function renderQuizFrame() {
  $('content').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="num" id="curNum">0</div><div class="label">ข้อ</div></div>
      <div class="stat"><div class="num correct" id="correctNum">0</div><div class="label">ถูก</div></div>
      <div class="stat"><div class="num wrong" id="wrongNum">0</div><div class="label">ผิด</div></div>
      <div class="stat"><div class="num" id="scoreNum">0%</div><div class="label">คะแนน</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    </div>
    <main id="mainArea"></main>`;
}

function updateStats() {
  $('curNum').textContent = cur + 1;
  $('correctNum').textContent = correctCount;
  $('wrongNum').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const pct = total === 0 ? 0 : Math.round((correctCount / total) * 100);
  $('scoreNum').textContent = pct + '%';
  $('progFill').style.width = ((cur) / QUESTIONS.length * 100) + '%';
}

function renderQuestion() {
  if (cur >= QUESTIONS.length) { renderEnd(); return; }
  answered = false;
  const q = QUESTIONS[order[cur]];
  updateStats();
  const subjTag = (IS_HARD && q.subject) ? `<span class="subj-tag">${escapeHtml(q.subject.split('_')[0].replace('QAB','A').replace('QAC','B').replace('QBA','C').replace('QBB','D'))}</span>` : '';
  const qNumCls = IS_HARD ? 'qnum hard' : 'qnum';
  $('mainArea').innerHTML = `
    <div class="question-card">
      <div>
        <span class="${qNumCls}">ข้อ ${cur + 1} / ${QUESTIONS.length}</span>
        ${subjTag}
      </div>
      <div class="question" style="margin-top: 12px;">${escapeHtml(q.q)}</div>
      <div class="choices">
        ${['A','B','C','D'].map(letter => `
          <button class="choice" data-letter="${letter}" onclick="selectAnswer('${letter}')">
            <span class="letter">${letter}</span>
            <span>${escapeHtml(q[letter.toLowerCase()])}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="controls">
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>${cur === QUESTIONS.length - 1 ? 'ดูผลรวม →' : 'ข้อถัดไป →'}</button>
        <button class="btn btn-secondary" onclick="restartQuiz()">เริ่มใหม่</button>
      </div>
    </div>`;
}

function selectAnswer(letter) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[order[cur]];
  const isCorrect = letter === q.correct;
  if (isCorrect) {
    correctCount++;
  } else {
    wrongCount++;
    wrongAnswers.push({
      q: q,
      userAnswer: letter,
      correctAnswer: q.correct,
      qIdx: cur + 1
    });
  }
  document.querySelectorAll('.choice').forEach(btn => {
    btn.disabled = true;
    const l = btn.dataset.letter;
    if (l === q.correct) btn.classList.add('correct');
    else if (l === letter) btn.classList.add('wrong');
  });
  const fb = $('feedback');
  const correctText = q[q.correct.toLowerCase()];
  if (isCorrect) {
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✓ ถูกต้อง!</strong>คำตอบ: ${q.correct}. ${escapeHtml(correctText)}`;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>✗ ผิด</strong>คำตอบที่ถูก: ${q.correct}. ${escapeHtml(correctText)}`;
  }
  $('nextBtn').disabled = false;
  updateStats();
}

function nextQuestion() { cur++; renderQuestion(); }

function restartQuiz() {
  if (confirm('เริ่มใหม่และสุ่มลำดับข้อใหม่?')) startQuiz();
}

function renderEnd() {
  updateStats();
  $('progFill').style.width = '100%';
  const total = QUESTIONS.length;
  const pct = Math.round((correctCount / total) * 100);
  const duration = Math.round((Date.now() - startTime) / 1000);
  let msg, emoji, memeFile;
  if (pct >= 100) { msg = 'BC is calling เต็ม100ได้100 เออ เริ่ด!!!'; emoji = '🏆'; memeFile = 'meme-100.jpg'; }
  else if (pct >= 95) { msg = 'ตัวเเม่ตัวมัมตัวBCมาก เจ๋งแจ่มแจ๋ว'; emoji = '🎉'; memeFile = 'meme-95.jpg'; }
  else if (pct >= 90) { msg = 'หลบหน่อย คนสวยจะเป็นพี่BCเด้อ'; emoji = '🎉'; memeFile = 'meme-90.jpg'; }
  else if (pct >= 80) { msg = 'ผ่านล่ะแม่ ดีจุยด้วย'; emoji = '🎉'; memeFile = 'meme-80.jpg'; }
  else { msg = 'อ่านใหม่ก่อนๆคุณแม่'; emoji = '💪'; memeFile = 'meme-0.jpg'; }
  const memeCaption = emoji + ' ' + msg;
  const memeHtml = `<div class="meme-box"><img src="${memeFile}" alt="meme" onerror="this.parentElement.style.display='none'"></div>`;
  
  const wrongHtml = wrongAnswers.length === 0
    ? `<div class="no-wrong">🌟 ตอบถูกทุกข้อ! ไม่มีข้อให้ทบทวน</div>`
    : `<div class="wrong-list">
        <h3>ข้อที่ตอบผิด (${wrongAnswers.length} ข้อ) — ทบทวนเฉลย</h3>
        ${wrongAnswers.map(w => {
          const correctText = w.q[w.correctAnswer.toLowerCase()];
          const userText = w.q[w.userAnswer.toLowerCase()];
          const subjTag = (IS_HARD && w.q.subject) ? `<span class="wq-subj">${escapeHtml(w.q.subject.split('_')[0].replace('QAB','A').replace('QAC','B').replace('QBA','C').replace('QBB','D'))}</span>` : '';
          return `
            <div class="wrong-item">
              <div class="wq">
                <span class="wq-num">ลำดับที่ ${w.qIdx}</span>${subjTag}
                ${escapeHtml(w.q.q)}
              </div>
              <div class="ans-row your-ans">✗ คุณตอบ: ${w.userAnswer}. ${escapeHtml(userText)}</div>
              <div class="ans-row correct-ans">✓ เฉลย: ${w.correctAnswer}. ${escapeHtml(correctText)}</div>
            </div>
          `;
        }).join('')}
      </div>`;
  
  $('content').innerHTML = `
    <div class="end-screen">
      <div class="end-header">
        <div class="big-emoji">${emoji}</div>
        <h2>${msg}</h2>
        <div class="name">${escapeHtml(userName)} • ใช้เวลา ${duration} วินาที</div>
        <div class="end-score">${correctCount} / ${total}</div>
        <div class="end-pct">${pct}%</div>
      </div>
      ${memeHtml}
      <div id="syncStatus" class="sync-status pending">⏳ กำลังบันทึกคะแนน...</div>
      ${wrongHtml}
      <div class="controls" style="justify-content: center; margin-top: 28px;">
        <button class="btn btn-primary" onclick="restartQuiz()">ทำใหม่ (สุ่มข้อใหม่)</button>
        <a class="btn btn-secondary" href="index.html" style="text-decoration: none; display: inline-flex; align-items: center;">เลือกวิชาอื่น</a>
      </div>
    </div>`;
  
  // Send score to Google Sheet
  submitScore(correctCount, total, pct, duration);
}

function submitScore(score, total, percent, duration) {
  const statusEl = $('syncStatus');
  const payload = {
    name: userName,
    subject: SUBJECT_NAME,
    score: score,
    total: total,
    percent: percent,
    duration: duration
  };
  // Use no-cors mode — Apps Script accepts text/plain without preflight
  fetch(WEBAPP_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  }).then(() => {
    if (statusEl) {
      statusEl.className = 'sync-status ok';
      statusEl.innerHTML = '✓ บันทึกคะแนนเรียบร้อย';
    }
  }).catch(err => {
    if (statusEl) {
      statusEl.className = 'sync-status err';
      statusEl.innerHTML = '⚠️ บันทึกคะแนนไม่สำเร็จ (ตรวจอินเทอร์เน็ต)';
    }
    console.error('Submit error:', err);
  });
}

// Start
renderLogin();
</script>
</body>
</html>
