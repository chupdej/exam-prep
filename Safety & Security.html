<head>

<title>SCC Quiz — QAC Safety & Security</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #6e3b89 0%, #4a1f73 100%);
    min-height: 100vh;
    padding: 16px;
    color: #1a1a1a;
  }
  .container {
    max-width: 800px;

    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  header {
    background: linear-gradient(135deg, #5b2a8a 0%, #3d1761 100%);
    color: white;
    padding: 24px 28px;
  }
  header h1 { font-size: 1.5rem; margin-bottom: 6px; }
  header .sub { opacity: 0.85; font-size: 0.95rem; }
  .stats {
    display: flex;
    gap: 16px;
    padding: 16px 28px;
    background: #faf7fc;
    border-bottom: 1px solid #e9e2ef;
    flex-wrap: wrap;
  }
  .stat {
    flex: 1;
    min-width: 100px;
    text-align: center;
  }
  .stat .num {
    font-size: 1.6rem;
    font-weight: 700;
    color: #5b2a8a;
  }
  .stat .num.correct { color: #2e7d32; }
  .stat .num.wrong { color: #c62828; }
  .stat .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    color: #666;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  .progress-wrap {
    padding: 0 28px 16px;
    background: #faf7fc;
  }
  .progress-bar {
    height: 8px;
    background: #e9e2ef;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #5b2a8a, #c294e3);
    width: 0%;
    transition: width 0.4s ease;
  }
  main { padding: 28px; }
  .question-card {
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .qnum {
    display: inline-block;
    background: #5b2a8a;
    color: white;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .qnum.hard { background: #d84315; }
  .subj-tag {
    display: inline-block;
    background: #f0e6f6;
    color: #5b2a8a;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-left: 6px;
  }
  .question {
    font-size: 1.1rem;
    line-height: 1.6;
    margin-bottom: 20px;
    color: #1a1a1a;
  }
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .choice {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 2px solid #e0d6e8;
    border-radius: 10px;
    background: white;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
    font-family: inherit;
    font-size: 0.98rem;
    line-height: 1.5;
    color: #1a1a1a;
  }
  .choice:hover:not(:disabled) {
    border-color: #5b2a8a;
    background: #faf7fc;
    transform: translateX(2px);
  }
  .choice:disabled { cursor: default; }
  .choice .letter {
    flex-shrink: 0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #e9e2ef;
    color: #5b2a8a;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .choice.correct {
    border-color: #2e7d32;
    background: #e8f5e9;
  }
  .choice.correct .letter {
    background: #2e7d32;
    color: white;
  }
  .choice.wrong {
    border-color: #c62828;
    background: #ffebee;
  }
  .choice.wrong .letter {
    background: #c62828;
    color: white;
  }
  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 10px;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .feedback.show { display: block; }
  .feedback.correct {
    background: #e8f5e9;
    border-left: 4px solid #2e7d32;
    color: #1b5e20;
  }
  .feedback.wrong {
    background: #ffebee;
    border-left: 4px solid #c62828;
    color: #b71c1c;
  }
  .feedback strong { display: block; margin-bottom: 4px; font-size: 0.95rem; }
  .feedback .ans { font-size: 0.95rem; line-height: 1.5; }
  .controls {
    margin-top: 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  button.btn {
    padding: 12px 22px;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary {
    background: #5b2a8a;
    color: white;
  }
  .btn-primary:hover { background: #3d1761; transform: translateY(-1px); }
  .btn-primary:disabled { background: #b8a4cc; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: #f0e6f6;
    color: #5b2a8a;
  }
  .btn-secondary:hover { background: #e0d0ee; }
  .end-screen {
    text-align: center;
    padding: 40px 20px;
  }
  .end-screen h2 { color: #5b2a8a; font-size: 1.8rem; margin-bottom: 12px; }
  .end-score {
    font-size: 4rem;
    font-weight: 700;
    color: #5b2a8a;
    margin: 20px 0;
  }
  .end-message {
    font-size: 1.1rem;
    color: #666;
    margin-bottom: 24px;
  }
  .end-screen .controls { justify-content: center; }
  footer {
    text-align: center;
    padding: 16px;
    background: #faf7fc;
    color: #888;
    font-size: 0.8rem;
    border-top: 1px solid #e9e2ef;
  }
  @media (max-width: 600px) {
    body { padding: 8px; }
    main { padding: 20px; }
    header { padding: 20px; }
    header h1 { font-size: 1.25rem; }
    .question { font-size: 1rem; }
    .choice { padding: 12px 14px; font-size: 0.92rem; }
    .stats { padding: 12px 20px; gap: 8px; }
    .stat .num { font-size: 1.3rem; }
  }
</style>
</head>

<script>
const QUESTIONS = [{"n": 1, "q": "Choose the CORRECT statement regarding cabin crew assigned station. (CCM 1.8.2)", "a": "Required cabin crew shall occupy the cabin crew assigned station or assigned passenger seat for takeoff and landing", "b": "Required cabin crew shall occupy the cabin crew assigned station for takeoff and landing", "c": "Extra cabin crew shall occupy only the assigned passenger seat for takeoff and landing", "d": "Required cabin crew shall occupy passenger seat for takeoff and landing", "correct": "B"}, {"n": 2, "q": "Which document is aimed to ensure that the significant change information in the Cabin Crew Manual Part 1 is well updated? (CCM 0.1.2)", "a": "Safety Briefing Highlights", "b": "Cabin Safety Circular", "c": "Cabin Crew Manual Part 1 Temporary Revision", "d": "Cabin Crew Manual Part 2 Temporary Revision", "correct": "C"}, {"n": 3, "q": "Which statement is CORRECT concerning the content in the Cabin Crew Manual Part 1? (CCM/TOC)", "a": "Chapter 1 Applicable Laws, Regulations and Rules/Chapter 3 Standard Operating Procedures", "b": "Chapter 2 Administration of First Aid/Chapter 4 Cabin Emergency Procedures", "c": "Chapter 5 Emergency Equipment and Location/Chapter 6 Dangerous Goods", "d": "Chapter 4 Dangerous Goods/Chapter 7 Security", "correct": "C"}, {"n": 4, "q": "The flight may be operated with reduced minimum number of required cabin crew subject for the following condition: (CCM 1.8.3)", "a": "CAAT may authorize the operation of the flight with reduced minimum number of required cabin crew for up to two consecutive sectors", "b": "The minimum number of required cabin crew may be reduced by one or more cabin crew from the required cabin crew complement", "c": "The flight may be operated without limitation of sector", "d": "The reduction shall be allowed for flight departing from any stations", "correct": "A"}, {"n": 5, "q": "Which word best describes \"an operating procedure or technique, etc. that may result in damage to equipment if not followed carefully\"?(CCM 0.1.7)", "a": "WARNING", "b": "Caution", "c": "Note", "d": "SOP", "correct": "B"}, {"n": 6, "q": "In case you find any discrepancy in the CCM Part 1, which function is the most suitable you must inform?(CCM 0.1.7)", "a": "QA", "b": "QA-A", "c": "QA-B", "d": "QA-C", "correct": "D"}, {"n": 7, "q": "To perform the pre-flight security check, when shall cabin crew who assigned to guard the opened door attaches the Cabin Pre-flight Security Check (Access Control Record) Form at the appropriate location adjacent to the opened door? (CCM 2.3.4.2)", "a": "As soon as cabin crew board the aircraft", "b": "When CIC orders CABIN CREW REPORT YOUR EM STATION", "c": "Right after finished the pre-flight check of safety and emergency equipment", "d": "Just before performing Pre-flight Security Check", "correct": "D"}, {"n": 8, "q": "Which word best describes \"an operating procedure or technique, etc. that may result in personal injury or loss of life if not followed carefully\"?(CCM 0.1.7)", "a": "WARNING", "b": "Caution", "c": "Note", "d": "SOP", "correct": "A"}, {"n": 9, "q": "Which of the following documents concerning the Unruly/Disruptive Passengers? (CCM 7.1.10)", "a": "Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice and AVSEC Form 10", "b": "Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice and Witness Form", "c": "Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice and AVSEC Form 02", "d": "Passenger Disturbance Report, Flight Disturbance Incident Report, Passenger Notice, Witness Form and AVSEC Form 06.", "correct": "B"}, {"n": 10, "q": "What shall be done (in sequence) in case there is a discrepancy of number of transit/landing passengers occurs when transit passenger onboard during transit stop? (CCM 2.39.4)", "a": "PA reminding landing passengers to disembark, Passenger headcount, Passport and boarding pass check", "b": "PA reminding landing passengers to disembark, Passenger headcount, Passengers belongings identification", "c": "PA reminding landing passengers to disembark, Passport and boarding pass check, Passenger headcount", "d": "PA reminding landing passengers to disembark, Passengers belongings identification, Passport and boarding pass check.", "correct": "A"}, {"n": 11, "q": "Which of the following is included in the category of PWD? (CCM 2.5.5)", "a": "INAD", "b": "YP", "c": "CBBG", "d": "People who are deaf or hard of hearing", "correct": "D"}, {"n": 12, "q": "When not on flight duty, the Crew-in-Charge (CIC) reports to___. (CCM 1.3.2.1)", "a": "DQ", "b": "QA", "c": "QB", "d": "OP-1", "correct": "B"}, {"n": 13, "q": "What should you do if you call station 1L from the crew rest compartment during performing the Cabin Safety and Emergency Equipment Check in the crew rest compartment, but the cabin interphone at station 1L is not available? (CCM 2.38.1)", "a": "Call another cabin crew station to confirm the communication/interphone system check", "b": "Call station 1L from your assigned station instead", "c": "Confirm the communication/interphone system check with CIC by in person", "d": "Make another attempt to call station 1L to confirm the communication/interphone system check", "correct": "A"}, {"n": 14, "q": "In order to avoid any detriment to a crew member performance, opportunities to consume a meal shall be arranged when the flight duty period exceeds __ (CCM 1.7.2.1)", "a": "7 hours", "b": "6 hours", "c": "5 hours", "d": "4 hours", "correct": "C"}, {"n": 15, "q": "If the cabin crew is compelled to contact the pilot requesting permission to enter the flight deck, such cabin crew shall contact the pilot normally but include the _________ which has been set up by PIC prior to each flight. (CCM 2.31.4)", "a": "Emergency Code", "b": "Identification Code", "c": "Urgency Code", "d": "Access Code", "correct": "A"}, {"n": 16, "q": "Where can you find the Passenger Disturbance Report (PDR), Flight Disturbance Incident Report (FDIR), and Witness Form? (CCM 7.1.10)", "a": "In the clear folder in AH kit", "b": "On the back cover of the Cabin Log", "c": "In the binder together with the CES", "d": "In the Captain Report Folder (CRF)", "correct": "D"}, {"n": 17, "q": "Refer to cabin crew briefing, which of the following topics not included in the Mandatory Requirements for Pre-flight Briefing (Safety/Security)? (CCM 2.1.2)", "a": "The characteristics of flight related safety issue and/or hazard identification", "b": "Update and recent changes to safety-related issues", "c": "Aircraft differentiation, cabin defect related to safety and/or specific aircraft information", "d": "Flight plan and NOTAM", "correct": "D"}, {"n": 18, "q": "Which statement is correct regarding the carry-on baggage? (CCM 2.9)", "a": "Cabin baggage may only be stowed in approved locations", "b": "Cabin baggage should not be stowed against forward or aft bulkhead", "c": "Cabin baggage should not be stowed on passenger lap during taxi, takeoff and landing", "d": "All answers are correct", "correct": "D"}, {"n": 19, "q": "The variant of aircraft types are considered to be different types if they are not similar in all the following aspects, except?(CCM 1.6.5)", "a": "Emergency exit operations", "b": "Location and type of safety equipment", "c": "Oxygen system", "d": "Emergency procedures", "correct": "C"}, {"n": 20, "q": "Choose the functions (or function) that exercise control(s) of the duty periods and rest schemes of all crew members. (CCM 1.7.2.1)", "a": "QA-A", "b": "QA-A and DP-A", "c": "DP-A and OP-1", "d": "DQ-1", "correct": "C"}, {"n": 21, "q": "Choose the best answer that explains \"Duty with Takeoff(s) and/or Landing (s) Within the Window of Circadian Low\".(CCM 1.7.5.1)", "a": "An early start duty involving take off(s) and/or landing(s) during the period of 0500LT to 0659LT", "b": "The duty involving takeoff(s) and/or landing(s) during the period of 0200 to 0559 hours local time (i.e., at the departure or arrival airport)", "c": "A late finish duty that involving take off(s) and/or landing(s) during the period of 0100LT to 0159LT", "d": "An 8-hour period of flight that falls between 2200LT and 0800LT", "correct": "B"}, {"n": 22, "q": "Which statement is correct concerning the duties and responsibilities of cabin crew? (CCM 1.3.1.1)", "a": "Regularly check the corporate email to remain informed of important company updates and operational information", "b": "Be familiar with available navigational facilities", "c": "Have access to the up-to-date revision of CCM, CCOM, CES which is relevant to cabin crew duties", "d": "Act as the liaison with the flight crew", "correct": "A"}, {"n": 23, "q": "Flight duty periods may be extended in such unforeseen operational circumstances by no more than __.(CCM 1.7.6.3)", "a": "No extension allowed", "b": "5 hours", "c": "4 hours", "d": "3 hours", "correct": "D"}, {"n": 24, "q": "CCM Part 1 is distributed only in the digital format and can be accessed through _____. (CCM 0.1.7)", "a": "Operations eLibrary and iCARE website", "b": "Operations eLibrary and THAIsphere website", "c": "Operations eLibrary and TGIT website", "d": "Operations eLibrary and Cabin Crew Handbook", "correct": "A"}, {"n": 25, "q": "To highlight the safety and security standard, the Pre-flight Briefing shall be given prior to the following duty EXCEPT_______.(CCM 2.1.1)", "a": "Prior to the commencement of any flight", "b": "Prior to the commencement of a series of consecutive flight", "c": "When an aircraft returns to operations after having been undergone maintenance", "d": "After each full rest period at slipping station", "correct": "C"}, {"n": 26, "q": "Cabin safety and emergency equipment check shall be performed: (CCM 2.2.1)", "a": "Prior to the first flight of the crew on an aircraft", "b": "Change of cabin crew", "c": "Continuous duty periods with crew rest between operations", "d": "All answers are correct", "correct": "D"}, {"n": 27, "q": "Which statement is CORRECT regarding ABP briefing? (CCM 4.1.3.2)", "a": "ABP-A will be briefed to assist and/or open the exit in case the cabin crew incapacitate", "b": "ABP-B will be briefed to assist special categories of passengers", "c": "ABP-C will be briefed to assist at the end of the slide and gather passengers upwind away from aircraft", "d": "ABP-D will be briefed to help special categories of passengers", "correct": "A"}, {"n": 28, "q": "When CIC orders, \"CABIN CREW REPORT YOUR EM STATION\", which duty shall be performed by cabin crew?(CCM 2.38)", "a": "Pre-flight security check must be performed according to their specific-colored zones", "b": "Check presence of passenger safety instruction card (spot/random check revision and aircraft type)", "c": "Perform final cabin safety check", "d": "Random inspect 25% of life jacket pouches stowed under passenger seats", "correct": "B"}, {"n": 29, "q": "You are requested the facility of using a bassinet from passenger, you can provide it to the passenger with _____.(CCM 2.5.4.5)", "a": "An infant with 6.7 kilograms weight", "b": "An infant with 65 inches height", "c": "An infant with 68 centimeters height", "d": "An infant with 6.7 months age", "correct": "A"}, {"n": 30, "q": "In case the CRS being verified by cabin crew that it is not approved to use on board the CRS shall be___.(CCM 2.5.4.6.3)", "a": "Labeled with CABIN tags", "b": "Loaded as checked baggage", "c": "Properly secured to the aircraft with seat belt and prohibited to use throughout the flight", "d": "Installed correctly prior to departure but prohibited to use throughout the flight", "correct": "B"}, {"n": 31, "q": "Choose the best answer that explains 'Passenger Requiring Medical Clearance (MEDA Case)' (CCM 2.5.5.1)", "a": "A passenger requires to use oxygen which provided by TG during on board the flight", "b": "A passenger refused admission to a country by authorities of such a country", "c": "A passenger considered as \"Dangerous Prisoner\"", "d": "A passenger involved in protecting government officials", "correct": "A"}, {"n": 32, "q": "Which type of passenger that can be accepted only one in economy class cabin in all aircraft type?(CCM 2.5.5.1.2)", "a": "Sick passenger traveling with escort", "b": "Sick passenger traveling without escort", "c": "Stretcher passenger", "d": "Wheelchair passenger traveling without escort", "correct": "C"}, {"n": 33, "q": "Which one is defined as passenger who cannot ascend/descend steps but is able to make own way to/from cabin seat, requires wheelchair for distance to/from aircraft, must be carried up/down steps?(CCM 2.5.6.1)", "a": "Passenger with type of WCHR", "b": "Passenger with type of WCHS", "c": "Passenger with type of WCHC", "d": "Passenger with type of WCHP", "correct": "B"}, {"n": 34, "q": "Which passenger could be defined as a deportee TYPE A (CCM 2.5.9)", "a": "Person who is travelling without proper document and try to be admitted illegally causing the refusal to be allowed to the country", "b": "Person(s) who had legally been admitted into a country or who had entered a country illegally, and who is required later by authorities to be removed from the country", "c": "Person who is under arrest by court of law to be transported to another country with the condition that he/she must always be escorted", "d": "Person who is in the custody of authorities and considered as \"Dangerous Prisoner\"", "correct": "B"}, {"n": 35, "q": "Which is the embarkation and disembarkation procedure for DEPAs?(CCM 2.5.9.5)", "a": "Board the aircraft and disembark after normal passengers", "b": "Board the aircraft and disembark the aircraft before normal passengers", "c": "Board the aircraft before other passengers and disembark after all passengers have left the aircraft", "d": "Board the aircraft after other passengers and disembark before all passengers have left the aircraft", "correct": "C"}, {"n": 36, "q": "Which can be served or provided to deportee type C? (CCM 2.5.9.6.2)", "a": "Alcohol beverage", "b": "Metal utensils", "c": "Food at the discretion of escorts", "d": "All answers are correct", "correct": "C"}, {"n": 37, "q": "What duty shall the assigned cabin crew specified in the Guideline for Final Cabin Safety Check immediately perform after the doors are armed? (CCM 2.17.2)", "a": "Start cabin emergency preparation", "b": "Guard the exits", "c": "Perform silent review", "d": "Report cabin readiness to CIC", "correct": "B"}, {"n": 38, "q": "What is not include in Cabin Safety and Emergency Equipment Check?(CCM 2.38.1)", "a": "Cabin crew shall check door mode selector in \"Disarm\" or \"Manual\"", "b": "Cabin crew shall check presence of passenger safety instruction card (spot/random check revision and aircraft type)", "c": "Cabin crew shall check no ground personnel remaining on board", "d": "Cabin crew shall check condition and function of cabin crew seat including safety harness", "correct": "C"}, {"n": 39, "q": "During the flight you find that a placard is not legible, you shall ___________.(CCM 2.21)", "a": "Report to CIC for entry in the Technical Log. PIC has to sign the Technical Log", "b": "Report to CIC for entry in the Technical Log. PIC does not have to sign the Technical Log", "c": "Report to CIC for entry in the Cabin Log. PIC has to sign the Cabin Log", "d": "Report to CIC for entry in the Cabin Log. PIC does not have to sign the Cabin Log", "correct": "D"}, {"n": 40, "q": "Which defect shall be reported to the PIC for entry in the Technical Log?(CCM 2.21)", "a": "A fault system in windows or doors", "b": "Markings and placards that are not legible or clearly visible", "c": "Cup holder broken", "d": "Galley units unable to latch", "correct": "A"}, {"n": 41, "q": "Before takeoff and landing during final cabin safety check, cabin crew shall _________.(CCM 2.22)", "a": "Check lavatories in the responsible zone vacant and unlock the lavatory door", "b": "Check lavatories in the responsible zone vacant and lock the lavatory door", "c": "Check lavatories in the responsible zone occupied and unlock the lavatory door", "d": "Check lavatories in the responsible zone occupied and lock the lavatory door", "correct": "B"}, {"n": 42, "q": "Which statement is CORRECT?(CCM 2.27)", "a": "All PEDs (including medical PEDs) shall be switched off in Low Visibility Operations", "b": "Passenger traveling with CPAP to be used on board must be obtained authorization from PC", "c": "The use of a PEDs for voice communication on board an aircraft is not permitted except when the aircraft has landed and exited the active runway", "d": "The open compartments designated for literature shall be used for the stowage of lightweight PEDs during taxi, takeoff and landing", "correct": "C"}, {"n": 43, "q": "Which statement is CORRECT concerning the guidelines to be considered for offering meal/beverage service to the flight deck?(CCM 2.33)", "a": "The PIC and the co-pilot should be served at the same time", "b": "To avoid spillage and consequential damage to electronics, drinks should be served with certain cover passing the central pedestal", "c": "To avoid spillage, beverages should be served separately from the meal tray", "d": "Alcoholic drinks can be consumed in the flight deck.", "correct": "C"}, {"n": 44, "q": "Before reporting \"STATION XX, EMERGENCY EQUIPMENT CHECK COMPLETED\", which is the CORRECT conditions?(CCM 2.38.1)", "a": "Curtain opened and secured with straps, overhead bins closed, door mode selector in \"DISARM\" or \"MANUAL\"", "b": "Curtain opened and secured with straps, overhead bins opened, door mode selector in \"DISARM\" or \"MANUAL\"", "c": "Curtain closed and secured, overhead bins opened, door mode selector in \"DISARM\" or \"MANUAL\"", "d": "Curtain closed and secured, overhead bins opened, door mode selector in \"ARMED\" or \"AUTOMATIC\"", "correct": "B"}, {"n": 45, "q": "According to Door Opening Procedure, CIC and doorman at main entry door, once the aerobridge/stairs has been properly positioned: CIC and cabin crew shall wait for the signal from ground personnel through the door observation window. WHEN READY doorman must:(CCM 2.38.15)", "a": "Confirm to ground personnel by Thumb up signal", "b": "Notify to ground personnel by Thumb down signal", "c": "Not reply", "d": "Open the door by using 2-man crew concept", "correct": "A"}, {"n": 46, "q": "Which of the following equipment content in the AED Supplementary Kit? (CCM 3.2.5.3)", "a": "Pocket masks and scissors", "b": "Pocket masks and yellow biohazard bag", "c": "Pocket masks and scoop/scraper", "d": "Pocket masks and absorbent powder", "correct": "A"}, {"n": 47, "q": "In order to minimize skin burn in case of fire on person, cabin crew shall instruct a person to ___. (CCM 4.5.8.2.14)", "a": "STOP DROP ROLL", "b": "Fan the fire", "c": "Discharge an extinguisher on him/herself", "d": "All of the above", "correct": "A"}, {"n": 48, "q": "Which of the following is not include in the symptoms of Hyperventilation?(CCM 3.3.17)", "a": "Rapid and deep breathing", "b": "Pain in lower abdomen", "c": "Blurring of vision", "d": "Muscular spasms of hands and feet", "correct": "B"}, {"n": 49, "q": "Which statement is CORRECT?(CCM 3.4)", "a": "Cabin crew or CIC may open the first aid kit only after received the permission from the PIC", "b": "When the UPK is used, PIC must be informed in order to enter in the Cabin Log", "c": "The cabin crew can open the kit. However, CIC and PIC must always be informed", "d": "Passengers traveling with personal portable oxygen bottle to be used on board must be obtained authorization from PC", "correct": "C"}, {"n": 50, "q": "Which statement is correct concerning the use of Zero Two Medical Oxygen during decompression?(CCM 3.4.6)", "a": "Replace the Zero Two Medical Oxygen mask with the portable oxygen bottle mask provided by cabin crew", "b": "Replace the Zero Two Medical Oxygen mask with the oxygen mask dropped from the aircraft ceiling", "c": "Continue using Zero Two Medical Oxygen mask due to the prevention of Hypoxia", "d": "Continue using Zero Two Medical Oxygen mask until the selected flow rate oxygen starting to drop, then replaced with the oxygen mask dropped from the aircraft ceiling", "correct": "B"}, {"n": 51, "q": "To communicate in case of emergency, the flight crew can make an urgency call to the cabin crew via PA: _________(CCM 4.1.1)", "a": "\"EMERGENCY STATION\"", "b": "\"CABIN CREW AT YOUR STATION\"", "c": "\"BRACE-BRACE\"", "d": "\"CIC REPORT TO FLIGHT DECK\"", "correct": "D"}, {"n": 52, "q": "On prepared emergency landing, how could flight crew alert cabin crew to proceed to their stations before impact? (CCM 4.2.3)", "a": "PA, \"CABIN CREW AT YOUR STATION\"", "b": "PA, \"EMERGENCY STATION\"", "c": "PA, \"RETURN TO SEAT AND FASTEN SEATBELT\"", "d": "PA, \"BRACE, BRACE\"", "correct": "B"}, {"n": 53, "q": "Bracing position for cabin crew AFT facing seat are: _______ (CCM 4.1.4.2.2)", "a": "Seat belt low and tight, shoulder harnesses secured, sit upright, press head, back and arms against backrest, legs apart, feet firmly on floor", "b": "Seat belt low and tight, shoulder harnesses secured, press chin against chest, arms slightly bent, hands rest on seat cushion, legs apart, feet firmly on the floor", "c": "Seat belt low and tight, shoulder harnesses secured, bend fully forward, legs apart, feet firmly on the floor", "d": "Seat belt low and tight, shoulder harnesses secured, head bend forward, place arms on lap, legs apart, feet firmly on the floor", "correct": "A"}, {"n": 54, "q": "The priorities of survival are ___.(CCM 4.4.2)", "a": "Protection, location, water, food", "b": "Protection, location, food, water", "c": "Protection, food, water, location", "d": "Protection, water, food, location", "correct": "A"}, {"n": 55, "q": "Fire requires 3 elements, combined in the right quantities to exist. The 3 elements are__.(CCM 4.5.2)", "a": "Oxygen, heat, fuel", "b": "Oxygen, heat, energy", "c": "Oxygen, heat, gas", "d": "Oxygen, heat, fluid", "correct": "A"}, {"n": 56, "q": "We can use water extinguisher to extinguish _______ fire.(CCM 4.5.3)", "a": "Class A", "b": "Class A and Class B", "c": "Class B and Class C", "d": "Class A and Class C", "correct": "A"}, {"n": 57, "q": "During flight there is a loud bang, together with a rush of air outside while you are serving passengers. There is a full cart with you. You shall________.(CCM 4.6.3.2)", "a": "Brake the cart and wedge them between passenger seats immediately. Then grab the nearest oxygen mask and put it on immediately. Shout from your location, \"PULL MASK DOWN, USE IT\"", "b": "Brake the cart and wedge them between passenger seats immediately. Then grab the nearest oxygen mask and put it on immediately. Shout from your location, \"PULL MASK DOWN, USE IT, DON", "c": "Brake the cart and wedge them between passenger seats immediately. Then proceed to cabin crew seats. Grab oxygen mask and put it on immediately. Shout from your location, \"PULL MASK DOWN, USE IT\"", "d": "Grab nearest available oxygen mask and put it on immediately. Sit on the nearest seat and fasten seatbelt. Brake the cart and wedge them between passenger seats. Shout, \"PULL MASK DOWN, USE IT\"", "correct": "D"}, {"n": 58, "q": "The demonstration kit (Demo Kit) contains___. (CCM 5.5.1)", "a": "A Demonstration life vest, an oxygen mask, a seatbelt", "b": "A Demonstration life vest, an oxygen mask, a seatbelt, a Safety Instruction Card", "c": "A Demonstration life vest, an oxygen mask", "d": "A Demonstration life vest, an oxygen mask, a Safety Instruction Card", "correct": "A"}, {"n": 59, "q": "What is the maximum blood alcohol level, in grams per liter, a crew member may have at the start of a flight duty period? (CCM 1.4.2)", "a": "0.0", "b": "0.02", "c": "0.2", "d": "0.4", "correct": "A"}, {"n": 60, "q": "In case of emergency situation, emergency flashlights are needed to use. Where can you find them? (CCM 5.4.3)", "a": "At each crew member's station", "b": "In stowage adjacent to each cabin crew", "c": "Under each cabin crew", "d": "In stowage/doghouse behind the last rows of each zone", "correct": "A"}, {"n": 61, "q": "How many hazard classes of dangerous goods?(CCM 6.5.2)", "a": "8", "b": "9", "c": "10", "d": "11", "correct": "B"}, {"n": 62, "q": "Where can you find the emergency procedure concerning dangerous goods? (CCM 6.11)", "a": "Emergency Response Guidance for Aircraft Incidents Involving Dangerous Goods", "b": "Cabin Crew Operating Manual", "c": "Operations Manual Part A", "d": "Cabin Crew Training Manual", "correct": "A"}, {"n": 63, "q": "Where can you find the Table of Provision for Dangerous Goods Carried by Passengers or Crew on THAI (TDGM Table 9-1)", "a": "CCM 6.10", "b": "CCH 6.10", "c": "ERG 6.10", "d": "PHM 6.10", "correct": "A"}, {"n": 64, "q": "Which statement is CORRECT? (CCM 7.1.9)", "a": "Crew member may restrain unruly passenger with cables without authorizations from the PIC", "b": "Crew member shall not restrain any passenger either with handcuffs or other cables without authorization from the PIC", "c": "Crew member shall restrain unruly passenger with cables while it is waiting for authorization from the PIC", "d": "Under the Chicago Convention, unruly/disruptive passengers cannot be held in restraint beyond the first stopover", "correct": "B"}, {"n": 65, "q": "According to the Bomb on Board Procedure, if the bomb can be moved, where is the least risk bomb location (LRBL)? (CCM 7.2.5)", "a": "RH AFT Lavatory", "b": "LH AFT Lavatory", "c": "RH AFT Cabin Door", "d": "LH AFT Cabin Door", "correct": "C"}, {"n": 66, "q": "According to ICAO document 9811 Manual on the implementation of the Security Provision of Annex 6, it defines a four-tiered scheme of threat level as following:(CCM 7.1.2)", "a": "Level 1: Disruptive behavior (suspicious or verbal threatening), Level 2: Physically abusive behavior, Level 3: Life-threatening behavior, Level 4: Attempted breach or actual breach of the flight crew compartment", "b": "Level 1: Physically abusive behavior, Level 2: Disruptive behavior (suspicious or verbal threatening), Level 3: Life-threatening behavior, Level 4: Attempted breach or actual breach of the flight crew compartment", "c": "Level 1: Physically abusive behavior, Level 2: Disruptive behavior (suspicious or verbal threatening), Level 3: Attempted breach or actual breach of the flight crew compartment, Level 4: Life-threatening behavior", "d": "Level 1: Disruptive behavior (suspicious or verbal threatening), Level 2: Attempted breach or actual breach of the flight crew compartment, Level 3: Life-threatening behavior, Level 4: Physically abusive behavior", "correct": "A"}, {"n": 67, "q": "According to CCM 7.4 Hijacking, one crew member assigned to communicate with the hijacker shall___.(CCM 7.4.5)", "a": "Negotiate", "b": "Encourage hijacker to talk", "c": "Attempt to rescue the passenger", "d": "All above are correct", "correct": "B"}, {"n": 68, "q": "If a suspect trafficking in persons occurs on board, the cabin crew should___. (CCM 7.5.4/7.5.5)", "a": "Attempt to rescue victim", "b": "Confront the trafficker", "c": "Act normally, do not display unusual concern or alarm", "d": "Try to initiate formal conversation", "correct": "C"}, {"n": 69, "q": "During boarding in case passenger belongings left behind is found outside the aircraft and needed to be returned to the owner. For security reason:(CCM 2.38.3)", "a": "The items must be identified by passenger in the cabin in presence of cabin crew and ground personnel", "b": "The items must be identified by passenger at the aircraft entrance in presence of ground personnel and cabin crew before being allowed to bring into the aircraft", "c": "The items must be identified by cabin crew and ground personnel at the aircraft entrance before bringing into the cabin to find the owner", "d": "The items must be identified by ground personnel at the aircraft entrance before bringing into the cabin to find the owner", "correct": "B"}, {"n": 70, "q": "How to ensure that CIC carries his/her required travel documents and manuals?(CCM 2.1.2)", "a": "CIC shows his/her required travel documents and manuals to CSV if applicable", "b": "CIC shows his/her required travel documents and manuals to cabin crew dispatcher", "c": "CIC crosschecks his/her required travel documents and manuals with the Next CIC", "d": "CIC crosschecks his/her required travel documents and manuals with any cabin crew in briefing room", "correct": "C"}, {"n": 71, "q": "Which statement is CORRECT?(CCM 1.4)", "a": "Crew member should, as a rule, not donate blood or bone marrow. If a crew member donated blood, flight duty is not permitted within 24 hours", "b": "Antihistamines pills should not be taken within 24 hours before flight duty", "c": "No sleeping pills may be taken within 12 hours before flight duty", "d": "Crew member shall not go deep-sea diving less than 72 hours before starting flight duty", "correct": "B"}, {"n": 72, "q": "Which is the CORRECT answer concerning the restriction in numbers to be carried for the following categories of passengers?(CCM 2.5.2/2.5.3/2.5.5.2)", "a": "1 UM for a child aged between 8-11 years old traveling on C-class", "b": "2 UM for a child aged between 8-11 years old traveling on C-class", "c": "2 YP for a young passenger aged between 12-17 years traveling on C-class", "d": "For sick passenger traveling without escort: not more than 4 in First Class or Business Class", "correct": "A"}, {"n": 73, "q": "If the door re-opening is required after door arming for any reasons, what action will be performed after establishing communication between flight deck, cabin and ground personnel and CIC has been notified?(CCM 2.38.5)", "a": "Doorman opens the door by using 2-man crew concept", "b": "CIC opens the door by using 2-man crew concept", "c": "Doorman and Assist Doorman disarm the door by using 2-man crew concept", "d": "Doorman and Assist Doorman ensure the door is in arm mode before opening the door", "correct": "C"}, {"n": 74, "q": "There is a life vest stowed on board the aircraft in each passenger seat. Which of the following statement is CORRECT concerning the installation of passenger life vest?(CCM 5.4.1)", "a": "The life vest must be stowed properly with a life vest pull strap outside", "b": "The life vest must be stowed properly with a life vest pull strap inside", "c": "The life vest must be stowed properly with a life vest pull strap under the foot rest cover", "d": "The life vest must be stowed properly without a life vest pull strap", "correct": "A"}, {"n": 75, "q": "Where can you find the information about the Standard Operating Procedures regarding Emergency Exit Seats? (CCM/TOC)", "a": "CCM Chapter 2", "b": "CCM Chapter 4", "c": "CCM Chapter 6", "d": "CCM Chapter 7", "correct": "A"}, {"n": 76, "q": "How many blind and/or deaf passengers travels with an escort dog can be accepted on TG flights?(CCM 2.5.7.2)", "a": "A maximum of 2", "b": "A maximum of 5", "c": "A maximum of 10", "d": "No limit", "correct": "D"}, {"n": 77, "q": "Which of the following is the CORRECT answer concerning Fueling/De-fueling when Passengers are Embarking/Disembarking/on Board?(CCM 2.34)", "a": "\"Fasten Seat Belts\" sign: ON, \"No Smoking\" sign: ON", "b": "\"Fasten Seat Belts\" sign: ON, \"No Smoking\" sign: OFF", "c": "\"Fasten Seat Belts\" sign: OFF, \"No Smoking\" sign: ON", "d": "\"Fasten Seat Belts\" sign: OFF, \"No Smoking\" sign: OFF", "correct": "C"}, {"n": 78, "q": "Which action is CORRECT when rejected takeoff occurs?(CCM 2.36.2)", "a": "Remain at station until the aircraft comes to a complete stop", "b": "Assess and monitor the cabin. Keep passengers under control", "c": "Do not initiate interphone calls between stations with no serious incident", "d": "All answers are correct", "correct": "D"}, {"n": 79, "q": "Which action occurs after CIC reports \"CABIN CLEAR\"? (CCM 2.38.5)", "a": "CIC confirms the number of passengers with the ground personnel", "b": "Cabin crew close and arm all cabin doors", "c": "Cabin crew confirm that crew meals are loaded", "d": "Cabin crew monitor safety video display on passenger screens", "correct": "D"}, {"n": 80, "q": "If passenger headcount is required at transit stop with a change of CA, which of the following statement is CORRECT?(CCM 2.39)", "a": "The inbound CA shall conduct a headcount. The outbound CA must conduct an Aircraft Pre-Departure Security Checks or Search", "b": "The inbound CA shall conduct a headcount and an Aircraft Pre-Departure Security Checks or Search", "c": "The outbound CA shall conduct a headcount and an Aircraft Pre-Departure Security Checks or Search", "d": "The ground personnel shall conduct a headcount. The outbound CA must conduct an Aircraft Pre-Departure Security Checks or Search", "correct": "A"}, {"n": 81, "q": "Portable oxygen bottle in the cabin is used for three purposes EXCEPT___. (CCM 5.2.1)", "a": "For use by required cabin crew during walk around after decompression", "b": "For use by passengers after decompression", "c": "For first-aid treatment of passengers", "d": "For use by cabin crew immediately when decompression occurs", "correct": "D"}, {"n": 82, "q": "After using portable oxygen bottles, cabin crew must ensure that the pressure must not be lower than ____.(CCM 5.2.1)", "a": "50 PSI", "b": "150 PSI", "c": "180 PSI", "d": "1500 PSI", "correct": "B"}, {"n": 83, "q": "At a transit stop where transit passengers remain on board, if there is only one passenger disembark, no discrepancy in the number of transit/landing passenger found, which statement is CORRECT?(CCM 2.39)", "a": "Cabin crew perform post-flight security check and additional onboard passenger belongings identification", "b": "Cabin crew perform post-flight security check and conduct passenger headcount", "c": "Cabin crew perform post-flight security check and conduct passport and boarding pass check", "d": "Cabin crew perform only post-flight security check without additional procedures", "correct": "A"}, {"n": 84, "q": "Which statement is CORRECT in the event of transit passenger remain on board during transit stop?(CCM 2.39)", "a": "Prior to passenger disembarkation, cabin crew perform passenger belongings identification", "b": "Prior to passenger disembarkation, CIC makes PA requesting passengers to have their boarding passes ready for inspection by ground personnel", "c": "Prior to passenger disembarkation, cabin crew perform passenger headcount procedure", "d": "Prior to passenger disembarkation, cabin crew perform passport and boarding pass check", "correct": "B"}];
const IS_HARD = false;

let order = [];
let cur = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  order = shuffle(QUESTIONS.map((_, i) => i));
  cur = 0;
  correctCount = 0;
  wrongCount = 0;
  document.getElementById('totalQ').textContent = QUESTIONS.length;
  renderQuestion();
}

function updateStats() {
  document.getElementById('curNum').textContent = cur + 1;
  document.getElementById('correctNum').textContent = correctCount;
  document.getElementById('wrongNum').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const pct = total === 0 ? 0 : Math.round((correctCount / total) * 100);
  document.getElementById('scoreNum').textContent = pct + '%';
  document.getElementById('progFill').style.width = ((cur) / QUESTIONS.length * 100) + '%';
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderQuestion() {
  if (cur >= QUESTIONS.length) { renderEnd(); return; }
  answered = false;
  const q = QUESTIONS[order[cur]];
  updateStats();
  const subjTag = (IS_HARD && q.subject) ? `<span class="subj-tag">${escapeHtml(q.subject.split('_')[0])}</span>` : '';
  const qNumCls = IS_HARD ? 'qnum hard' : 'qnum';
  const html = `
    <div class="question-card">
      <div>
        <span class="${qNumCls}">ข้อ ${cur + 1} / ${QUESTIONS.length}</span>
        ${subjTag}
      </div>
      <div class="question" style="margin-top: 12px;">${escapeHtml(q.q)}</div>
      <div class="choices">
        ${['A','B','C','D'].map(letter => `
          <button class="choice" data-letter="${letter}" onclick="selectAnswer('${letter}')">
            <span class="letter">${letter}</span>
            <span>${escapeHtml(q[letter.toLowerCase()])}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="controls">
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>ข้อถัดไป →</button>
        <button class="btn btn-secondary" onclick="restartQuiz()">เริ่มใหม่ (สุ่มใหม่)</button>
      </div>
    </div>`;
  document.getElementById('main').innerHTML = html;
}

function selectAnswer(letter) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[order[cur]];
  const isCorrect = letter === q.correct;
  if (isCorrect) correctCount++; else wrongCount++;
  
  // Disable all choices, mark correct one green
  document.querySelectorAll('.choice').forEach(btn => {
    btn.disabled = true;
    const l = btn.dataset.letter;
    if (l === q.correct) btn.classList.add('correct');
    else if (l === letter) btn.classList.add('wrong');
  });
  
  // Feedback box
  const fb = document.getElementById('feedback');
  const correctText = q[q.correct.toLowerCase()];
  if (isCorrect) {
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✓ ถูกต้อง!</strong><div class="ans">คำตอบ: ${q.correct}. ${escapeHtml(correctText)}</div>`;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>✗ ผิด</strong><div class="ans">คำตอบที่ถูกคือ: ${q.correct}. ${escapeHtml(correctText)}</div>`;
  }
  document.getElementById('nextBtn').disabled = false;
  updateStats();
}

function nextQuestion() {
  cur++;
  renderQuestion();
}

function restartQuiz() {
  if (confirm('เริ่มใหม่และสุ่มลำดับข้อใหม่?')) startQuiz();
}

function renderEnd() {
  updateStats();
  document.getElementById('progFill').style.width = '100%';
  const total = QUESTIONS.length;
  const pct = Math.round((correctCount / total) * 100);
  let msg, emoji;
  if (pct >= 90) { msg = 'ยอดเยี่ยม! พร้อมสอบจริงแล้ว'; emoji = '🏆'; }
  else if (pct >= 75) { msg = 'ดีมาก! เกือบพร้อมแล้ว'; emoji = '🎉'; }
  else if (pct >= 60) { msg = 'ผ่านเกณฑ์ ฝึกเพิ่มอีกนิด'; emoji = '👍'; }
  else if (pct >= 40) { msg = 'ยังต้องอ่านเพิ่ม สู้ๆ'; emoji = '📖'; }
  else { msg = 'อ่านเนื้อหาใหม่ก่อนนะครับ'; emoji = '💪'; }
  document.getElementById('main').innerHTML = `
    <div class="end-screen">
      <div style="font-size: 4rem;">${emoji}</div>
      <h2>เสร็จสิ้น</h2>
      <div class="end-score">${correctCount} / ${total}</div>
      <div style="font-size: 1.5rem; color: #5b2a8a; margin-bottom: 8px;">${pct}%</div>
      <div class="end-message">${msg}</div>
      <div class="controls">
        <button class="btn btn-primary" onclick="restartQuiz()">ทำใหม่ (สุ่มข้อใหม่)</button>
      </div>
    </div>`;
}

startQuiz();
</script>
</body>
</html>
