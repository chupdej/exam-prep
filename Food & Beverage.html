<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Food & Beverage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Sarabun', sans-serif;
    background: linear-gradient(135deg, #6e3b89 0%, #4a1f73 100%);
    min-height: 100vh;
    padding: 16px;
    color: #1a1a1a;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  header {
    background: linear-gradient(135deg, #5b2a8a 0%, #3d1761 100%);
    color: white;
    padding: 24px 28px;
  }
  header h1 { font-size: 1.5rem; margin-bottom: 6px; }
  header .sub { opacity: 0.85; font-size: 0.95rem; }
  header .back {
    display: inline-block;
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 0.85rem;
    margin-bottom: 10px;
  }
  header .back:hover { color: white; }
  .stats {
    display: flex;
    gap: 16px;
    padding: 16px 28px;
    background: #faf7fc;
    border-bottom: 1px solid #e9e2ef;
    flex-wrap: wrap;
  }
  .stat { flex: 1; min-width: 80px; text-align: center; }
  .stat .num { font-size: 1.5rem; font-weight: 700; color: #5b2a8a; }
  .stat .num.correct { color: #2e7d32; }
  .stat .num.wrong { color: #c62828; }
  .stat .label { font-size: 0.72rem; text-transform: uppercase; color: #666; margin-top: 2px; letter-spacing: 0.5px; }
  .progress-wrap { padding: 0 28px 16px; background: #faf7fc; }
  .progress-bar { height: 8px; background: #e9e2ef; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #5b2a8a, #c294e3); width: 0%; transition: width 0.4s ease; }
  main { padding: 28px; }
  .question-card { animation: slideIn 0.4s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .qnum { display: inline-block; background: #5b2a8a; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }
  .qnum.hard { background: #d84315; }
  .subj-tag { display: inline-block; background: #f0e6f6; color: #5b2a8a; padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; margin-left: 6px; }
  .question { font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; color: #1a1a1a; }
  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px; border: 2px solid #e0d6e8; border-radius: 10px;
    background: white; cursor: pointer; transition: all 0.2s;
    text-align: left; width: 100%; font-family: inherit;
    font-size: 0.98rem; line-height: 1.5; color: #1a1a1a;
  }
  .choice:hover:not(:disabled) { border-color: #5b2a8a; background: #faf7fc; transform: translateX(2px); }
  .choice:disabled { cursor: default; }
  .choice .letter {
    flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
    background: #e9e2ef; color: #5b2a8a; display: inline-flex;
    align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem;
  }
  .choice.correct { border-color: #2e7d32; background: #e8f5e9; }
  .choice.correct .letter { background: #2e7d32; color: white; }
  .choice.wrong { border-color: #c62828; background: #ffebee; }
  .choice.wrong .letter { background: #c62828; color: white; }
  .feedback {
    margin-top: 18px; padding: 14px 16px; border-radius: 10px;
    display: none; animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .feedback.show { display: block; }
  .feedback.correct { background: #e8f5e9; border-left: 4px solid #2e7d32; color: #1b5e20; }
  .feedback.wrong { background: #ffebee; border-left: 4px solid #c62828; color: #b71c1c; }
  .feedback strong { display: block; margin-bottom: 4px; font-size: 0.95rem; }
  .controls { margin-top: 24px; display: flex; gap: 10px; flex-wrap: wrap; }
  button.btn {
    padding: 12px 22px; border: none; border-radius: 10px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
  }
  .btn-primary { background: #5b2a8a; color: white; }
  .btn-primary:hover { background: #3d1761; transform: translateY(-1px); }
  .btn-primary:disabled { background: #b8a4cc; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #f0e6f6; color: #5b2a8a; }
  .btn-secondary:hover { background: #e0d0ee; }
  
  /* Login screen */
  .login-screen { padding: 40px 28px; text-align: center; }
  .login-screen .emoji { font-size: 3.5rem; margin-bottom: 12px; }
  .login-screen h2 { color: #5b2a8a; font-size: 1.5rem; margin-bottom: 8px; }
  .login-screen .desc { color: #666; margin-bottom: 28px; }
  .login-form { max-width: 360px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }
  .login-form input {
    padding: 14px 16px; border: 2px solid #e0d6e8; border-radius: 10px;
    font-size: 1rem; font-family: inherit; outline: none; transition: border 0.2s;
  }
  .login-form input:focus { border-color: #5b2a8a; }
  .login-form .error { color: #c62828; font-size: 0.9rem; min-height: 1.2em; }
  
  /* End screen */
  .end-screen { padding: 32px 20px; }
  .end-header { text-align: center; margin-bottom: 28px; }
  .end-header .big-emoji { font-size: 4rem; margin-bottom: 8px; }
  .end-header h2 { color: #5b2a8a; font-size: 1.6rem; margin-bottom: 8px; }
  .end-header .name { color: #666; font-size: 1rem; margin-bottom: 16px; }
  .end-score { font-size: 3.5rem; font-weight: 700; color: #5b2a8a; line-height: 1; }
  .end-pct { font-size: 1.5rem; color: #5b2a8a; margin-top: 6px; }
  .end-message { font-size: 1rem; color: #666; margin-top: 12px; }
  .meme-box { text-align: center; margin: 24px auto 0; max-width: 450px; }
  .meme-box img {
    max-width: 100%; max-height: 320px; border-radius: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: block; margin: 0 auto;
  }
  .meme-box .meme-caption {
    margin-top: 10px; font-size: 0.95rem; color: #5b2a8a; font-style: italic;
  }
  .sync-status {
    margin: 20px auto; max-width: 400px; padding: 12px 16px;
    border-radius: 8px; font-size: 0.9rem; text-align: center;
  }
  .sync-status.pending { background: #fff8e1; color: #f57c00; }
  .sync-status.ok { background: #e8f5e9; color: #2e7d32; }
  .sync-status.err { background: #ffebee; color: #c62828; }
  
  .wrong-list { margin-top: 28px; }
  .wrong-list h3 {
    color: #c62828; font-size: 1.15rem; margin-bottom: 14px;
    padding-bottom: 8px; border-bottom: 2px solid #fde2e2;
  }
  .wrong-item {
    background: #fafafa; border-left: 4px solid #c62828;
    padding: 14px 16px; margin-bottom: 12px; border-radius: 8px;
  }
  .wrong-item .wq {
    font-weight: 600; color: #1a1a1a; margin-bottom: 8px; line-height: 1.5;
  }
  .wrong-item .wq-num {
    display: inline-block; background: #c62828; color: white;
    padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; margin-right: 6px;
  }
  .wrong-item .wq-subj {
    display: inline-block; background: #fff; color: #5b2a8a;
    padding: 2px 8px; border-radius: 6px; font-size: 0.72rem;
    border: 1px solid #e0d6e8; margin-right: 6px;
  }
  .wrong-item .ans-row { font-size: 0.92rem; line-height: 1.5; margin-top: 4px; }
  .wrong-item .your-ans { color: #c62828; }
  .wrong-item .correct-ans { color: #2e7d32; font-weight: 600; }
  .no-wrong {
    text-align: center; padding: 30px; background: #e8f5e9;
    border-radius: 12px; color: #1b5e20; font-size: 1.05rem;
  }
  
  footer { text-align: center; padding: 16px; background: #faf7fc; color: #888; font-size: 0.8rem; border-top: 1px solid #e9e2ef; }
  @media (max-width: 600px) {
    body { padding: 8px; }
    main { padding: 20px; }
    header { padding: 20px; }
    header h1 { font-size: 1.25rem; }
    .question { font-size: 1rem; }
    .choice { padding: 12px 14px; font-size: 0.92rem; }
    .stats { padding: 12px 16px; gap: 6px; }
    .stat .num { font-size: 1.2rem; }
    .end-score { font-size: 2.8rem; }
  }
</style>
</head>

<script>
const QUESTIONS = [{"n": 1, "q": "What is Potato Lyonnaise (MLP) ?", "a": "Fried in butter with onions", "b": "Light browned crust or melted with cheese", "c": "Roughly chopped into strips", "d": "Potato dish with sliced and baked", "correct": "A"}, {"n": 2, "q": "What is a strict European vegetarian which contains no animal products of any type? (SI/ October 2025)", "a": "VLML", "b": "VOML", "c": "VGML", "d": "VJML", "correct": "C"}, {"n": 3, "q": "What is Malai Tikka? (MLP)", "a": "Creamy yoghurt chicken", "b": "Spicy chicken with cottage cheese", "c": "Stir fried chicken with paprika", "d": "Chicken marinated in yoghurt and pickle brine", "correct": "A"}, {"n": 4, "q": "Which one is correct? (CCSH)", "a": "AAC = A/H Kit and Amenities Checklist", "b": "CAC = Catering Articles Checklist", "c": "LLP = Liqueur Loading Plan", "d": "CEC = Cabin Equipment Checklist", "correct": "A"}, {"n": 5, "q": "Which SPML is provided for passengers who have special dietary requirements regarding health?", "a": "BBML", "b": "DBML", "c": "CHML", "d": "VJML", "correct": "B"}, {"n": 6, "q": "A tea blend which has been flavored with oil of bergamot is ______ .", "a": "Earl grey", "b": "Camomile", "c": "English breakfast", "d": "Ceylon tea", "correct": "A"}, {"n": 7, "q": "A meal that omits all foods containing milk, whey, curd or skim milk is typically referred to as _______ . (SI/ October 2025)", "a": "BLML", "b": "NLML", "c": "VLML", "d": "LFML", "correct": "B"}, {"n": 8, "q": "What is the document that cabin crew can use as a reference in finding meal loading position on each flight? (CCSH)", "a": "CMD", "b": "CAC", "c": "LLP", "d": "CEC", "correct": "D"}, {"n": 9, "q": "What is the process for mixing a Shandy?", "a": "1/2 chilled beer and 1/2 lemonade", "b": "1/2 chilled tomato juice and 1/2 chilled beer", "c": "1/2 chilled champagne and 1/2 chilled tomato juice", "d": "1/2 Vodka and chilled tomato juice", "correct": "A"}, {"n": 10, "q": "What is the description of Stir fried?", "a": "Fry quickly in a little hot fat", "b": "Heat food slowly with oil and moisturize in a tightly sealed vessel", "c": "Fry in a quantity of fat sufficient to cover the food being cooked", "d": "Cook food in a pan in a moderate amount of oil or fat", "correct": "A"}, {"n": 11, "q": "What is the definition of IKURA in JAPANESE?", "a": "Salmon roe", "b": "Mussels", "c": "Seafood", "d": "Flying fish roe", "correct": "A"}, {"n": 12, "q": "Which of the following is NOT a Swiss cheese?", "a": "Gruyere", "b": "Emmental", "c": "Tete de Moine", "d": "Boursin", "correct": "D"}, {"n": 13, "q": "Which flavor of rice crackers is not available on THAI's flight? (Cabin Insights)", "a": "Sauerkraut", "b": "Garlic and pepper", "c": "Wasabi", "d": "Cheddar cheese", "correct": "D"}, {"n": 14, "q": "Which one is the best description of the body of a wine?", "a": "The type of grapes used to make the wine", "b": "The weight ad texture of the wine in the mouth", "c": "The level of sweetness and acidity of the wine", "d": "The alcohol content of the wine", "correct": "B"}, {"n": 15, "q": "What is the gastronomic definition of Escalope?", "a": "A thick, unboned meat cut", "b": "A small, round nugget of meat", "c": "A thin, boneless slice of meat", "d": "A small tender slice of meat", "correct": "C"}, {"n": 16, "q": "What kind of sauce is made by adding melted or clarified butter and lime juice to whisked egg yolks and heated gently?", "a": "Soubise", "b": "Bechamel sauce", "c": "Cardinal sauce", "d": "Hollandaise sauce", "correct": "D"}, {"n": 17, "q": "Which of the following is a group of blue cheeses? (CTR)", "a": "Havarti, Leicester, Taleggio", "b": "Ricotta, Stilton, Port Salut", "c": "Gruyere, Gorgonzola, Samsoe", "d": "Gorgonzola, Stilton, Roquefort", "correct": "D"}, {"n": 18, "q": "Which of the following group contains only French cheese?", "a": "Camembert, Tilsit, Manchego", "b": "Roquefort, Boursin, Chevre", "c": "Brie, Stilton, Dana blue", "d": "Boursin, Gruyere, Emmental", "correct": "B"}, {"n": 19, "q": "Which of the following is NOT related to Kosher meals?", "a": "Separation of meat and dairy", "b": "Avoidance of pork and shellfish", "c": "Supervision by a rabbinic authority", "d": "Use of certified halal meat", "correct": "D"}, {"n": 20, "q": "Which statement about Doi Tung Coffee is INCORRECT?", "a": "Floral and spicy taste notes", "b": "Royal Highland Single Origin", "c": "Good taste for a Good Cause project", "d": "Arabica coffee", "correct": "A"}, {"n": 21, "q": "Which of the following flights does not require a Muslim passenger to order Muslim meals?", "a": "BKK - BOM / KTM / MAA V.V", "b": "BKK - BLR / DAC / MCT V.V", "c": "BKK - ISB / KHI / LHE V.V", "d": "BKK - CCU / CMB / DEL V.V", "correct": "C"}, {"n": 22, "q": "Which pair of the special meal code is for passengers who are strict vegetarians?", "a": "VJML / VLML", "b": "VGML / VJML", "c": "AVML / VOML", "d": "AVML / VGML", "correct": "B"}, {"n": 23, "q": "What kind of special meal strictly prohibits the offering of the regular bread rolls?", "a": "DBML", "b": "LFML", "c": "LCML", "d": "GFML", "correct": "D"}, {"n": 24, "q": "What is the definition of Vegan?", "a": "Vegetarian who consumes vegetables, fruits, nuts and dairy products", "b": "Vegetarian who consumes eggs only.", "c": "Vegetarian who consumes dairy products.", "d": "Vegetarian who avoids all food from the animal kingdom including eggs and dairy products.", "correct": "D"}, {"n": 25, "q": "What is the meaning of Simmer?", "a": "To cook food in the steam rising from boiling water", "b": "To slowly cook food in liquid just below boiling point", "c": "To briefly cook food in liquid then put into cold water", "d": "To cook food in a small amount of fat, turn and brown on each side", "correct": "B"}, {"n": 26, "q": "What kind of salad dressing is made from wine vinegar, mustard powder, salt and pepper, vegetable oil, sugar and chopped onion?", "a": "French dressing", "b": "Balsamic dressing", "c": "Italian dressing", "d": "Thousand Island dressing", "correct": "A"}, {"n": 27, "q": "What kind of salad dressing is made from mustard, salt and pepper, olive oil and lime juice?", "a": "French dressing", "b": "Balsamic dressing", "c": "Italian dressing", "d": "Thousand Island dressing", "correct": "C"}, {"n": 28, "q": "What is Waldorf salad?", "a": "Mixed vegetables with French dressing and chopped parsley", "b": "Fresh apple mixed with breadcrumb, mashed potato, olive oil, salt and pepper", "c": "Tender lentil mixed with chopped parsley, scallion and Italian dressing", "d": "Canned pineapple or diced fresh apple and celery mixed with mayonnaise and walnut slices", "correct": "D"}, {"n": 29, "q": "What is the meaning of DICE?", "a": "To top food with cheese and bitter then grill or bake until crisp", "b": "To cook food by submerging it in liquid that is just below boiling point", "c": "To cut vegetables into neat barrel shapes", "d": "To cut food into small, equal sized cubes", "correct": "D"}, {"n": 30, "q": "What is Gajur Mutter Pulao?", "a": "Paneer cube cooked with creamy tomato butter sauce", "b": "Indian Basmati rice with carrot and green pea", "c": "Stir fried cauliflower florets with coriander and turmeric", "d": "Indian curry with ginger and masala sauce", "correct": "B"}, {"n": 31, "q": "What kinds of SPML will be added in 2026 to respond to the dietary needs of passengers? (SI/ October 2025)", "a": "PNML and FFML", "b": "IVML and PFML", "c": "NPML and NFML", "d": "NFML and PFML", "correct": "D"}, {"n": 32, "q": "What is a stuffed pasta consisting of a filling enclosed between two layers of pasta dough called?", "a": "Ravioli", "b": "Cannelloni", "c": "Lasagne", "d": "Tortellini", "correct": "A"}, {"n": 33, "q": "Which country is Heineken beer originally from?", "a": "Germany", "b": "Denmark", "c": "Belgium", "d": "The Netherlands", "correct": "D"}, {"n": 34, "q": "What is Prosciutto?", "a": "An Italian sausage", "b": "An Italian ham", "c": "An Italian cheese", "d": "An Italian dressing salad", "correct": "B"}, {"n": 35, "q": "What does the term Risotto mean?", "a": "A type of pasta made from durum wheat, often served with tomato or cream-based sauces", "b": "A rice dish cooked with meat, fish, or vegetables broth until it reaches a creamy consistency", "c": "A type of rice pudding, typically sweetened with sugar and flavored with cinnamon or vanilla", "d": "A traditional soup made with vegetables, beans, and pasta", "correct": "B"}, {"n": 36, "q": "What is the queen of fruits in Thailand?", "a": "Durian", "b": "Mangosteen", "c": "Rose apple", "d": "Rambutan", "correct": "B"}, {"n": 37, "q": "Which type of cheese is soft, features a white bloomy rind, and is made from goat's milk?", "a": "Brie", "b": "Gorgonzola", "c": "Chevre", "d": "Camembert", "correct": "C"}, {"n": 38, "q": "What does FPML stand for? (SI/ October 2025)", "a": "Fresh fruit plate meal", "b": "Fruit plate meal", "c": "Fresh fruit platter meal", "d": "Fruit platter meal", "correct": "D"}, {"n": 39, "q": "According to IATA special meal code, what does AVML stand for? (SI/ October 2025)", "a": "Indian Vegetarian Meal", "b": "Asian Vegetarian Meal", "c": "Vegetarian Meal", "d": "Vegetarian Oriental Meal", "correct": "B"}, {"n": 40, "q": "What does PFML stand for? (SI/ October 2025)", "a": "Protein Free Meal", "b": "Pea Allergic Meal", "c": "Platter Fruit Meal", "d": "Peanut Free Meal", "correct": "D"}, {"n": 41, "q": "What does LCML stand for? (SI/ October 2025)", "a": "Low Calorie Meal", "b": "Low Cholesterol Meal", "c": "Low Calorie Diet Meal", "d": "Low Calcium Meal", "correct": "C"}, {"n": 42, "q": "Which is recommended temperature of champagne serving?", "a": "9-11 degree celcius", "b": "10-14 degree celcius", "c": "3-5 degree celcius", "d": "6-9 degree celcius", "correct": "D"}, {"n": 43, "q": "What does SAUTE mean?", "a": "To cook in a small amount of fat, turn and brown on each side with less fat than frying", "b": "To cook by direct heat, as on a gridiron over the heat or in an oven under the heat", "c": "To cook in a pan or on a griddle over direct heat usually in fat or oil", "d": "To burn or char the surface of meat", "correct": "A"}, {"n": 44, "q": "What does BROIL mean?", "a": "To cook in a small amount of fat, turn and brown on each side with less fat than frying", "b": "To cook by exposing food to direct heat, such as on a gridiron over the heat or in an oven under the heat", "c": "To cook in a pan or on a griddle over direct heat usually in fat or oil", "d": "To cook by direct heat, usually over hot coals or a flame, with the heat source coming from below", "correct": "B"}, {"n": 45, "q": "What kind of tea is usually served during an afternoon tea service?", "a": "English Breakfast tea", "b": "Ceylon tea", "c": "Camomile tea", "d": "Earl Grey tea", "correct": "D"}, {"n": 46, "q": "Which of the following is not a type of pasta?", "a": "Taleggio", "b": "Conchiglie", "c": "Farfalle", "d": "Tagliatelle", "correct": "A"}, {"n": 47, "q": "A lean and tender small round steak cut from the thin end of the fillet along the back of the animal can be referred to as _____ .", "a": "Bistecca", "b": "Porterhouse", "c": "Filet Mignon", "d": "Chateaubriand", "correct": "C"}, {"n": 48, "q": "Which statement is INCORRECT about Kosher meal?", "a": "Never break the seal or open the box unless allowed by passenger", "b": "Kosher in Hebrew means FIT AND PROPER", "c": "Transfer food and equipment from the box to tray before serving", "d": "Cream product must not be offered if any meat is served to the Kosher passenger", "correct": "C"}, {"n": 49, "q": "Which of the following statements is most accurate regarding a Diabetic Meal?", "a": "The meal is designed for insulin-dependent diabetics and excludes all forms of sugar.", "b": "The meal follows dietary guidelines, offering low energy, high dietary fiber, and controlled sugar content.", "c": "The meal is prepared with dairy products and is suitable for individuals with lactose intolerance.", "d": "The meal meets the dietary needs of athletes and vegetarians.", "correct": "B"}, {"n": 50, "q": "Which of the following is not made from pork?", "a": "Guanciale", "b": "Cambridge sausage", "c": "Denver leg", "d": "Pancetta", "correct": "C"}, {"n": 51, "q": "What is the definition of Dauphinoise potatoes ?", "a": "Potatoes cut in small nut-like shapes and lightly fried in brown butter", "b": "Fried potatoes along with green and red bell peppers", "c": "Cold potato salad with an oil dressing", "d": "Sliced potatoes baked in milk, cream and cheese", "correct": "D"}, {"n": 52, "q": "What type of coffee is made by diluting espresso with three parts hot water?", "a": "Cappuccino", "b": "Macchiato", "c": "Americano", "d": "Cafe au lait", "correct": "C"}, {"n": 53, "q": "What is the meaning of Julienne?", "a": "A type of knife used in French cuisine", "b": "A cooking technique involving heat", "c": "A food technique for blending ingredients", "d": "A food preparation technique involving precise cutting", "correct": "D"}, {"n": 54, "q": "Crew special meals can be requested except _____ . (CCH)", "a": "LSML", "b": "LCML", "c": "VLML", "d": "FPML", "correct": "D"}, {"n": 55, "q": "During the cheese and fruit service, what should cabin crew offer to passengers?", "a": "Cognac and Liqueur", "b": "Red wine and Port", "c": "Red wine and White wine", "d": "Champagne and Liqueur", "correct": "B"}, {"n": 56, "q": "What is Tiramisu?", "a": "A layered dessert with coffee and mascarpone", "b": "A frozen treat flavored with almond liqueur", "c": "A traditional Japanese sweet made with rice flour", "d": "A sponge cake infused with espresso and cocoa", "correct": "A"}, {"n": 57, "q": "What is a characteristic of Vodka?", "a": "Flavor from the juniper berry and other botanical ingredients", "b": "Odorless, tasteless, colorless, and smooth", "c": "Aged in oak barrels for a smoky flavor", "d": "Made primarily from fermented grapes and known for its fruity aroma", "correct": "B"}, {"n": 58, "q": "Which statement is correct about green tea?", "a": "Always offer with sugar and milk", "b": "Use boiling water to make green tea", "c": "Color of tea should be clear green color", "d": "Tea bag can be used more than once", "correct": "C"}, {"n": 59, "q": "What is the term for cutting food into thin, matchstick-like strips?", "a": "Julienne", "b": "Batonnet", "c": "Mince", "d": "Shred", "correct": "A"}, {"n": 60, "q": "The cabin crew is able to find information related to the spare soft drink unit from ______, spare toilet articles loading from ______, and the extra paper cocktail napkins from ______, respectively.", "a": "CEC, AAC, CAC", "b": "CEC, CAC, AAC", "c": "CAC, CEC, AAC", "d": "AAC, CEC, CAC", "correct": "B"}, {"n": 61, "q": "Which statement best describes Polenta roll?", "a": "A elongated roll made from ground cornmeal", "b": "Polenta roll is traditionally made from semolina flour", "c": "A crescent-shaped roll commonly served with butter", "d": "Polenta roll is typically prepared using rye or barley grains", "correct": "A"}, {"n": 62, "q": "What kind of cocktail does not contain alcohol?", "a": "Apple Jack", "b": "Bloody Mary", "c": "Virgin Mary", "d": "Red Eye", "correct": "C"}, {"n": 63, "q": "What is the meaning of Whisky dry?", "a": "Whisky with ice", "b": "Whisky without ice", "c": "Whisky mixed with soda", "d": "Whisky mixed with ginger ale", "correct": "D"}, {"n": 64, "q": "Which statement about cooking terms is INCORRECT? (CTR)", "a": "Roast is to cook in oven by means of a combination of convection and radiation.", "b": "Poach is to cook in water that bubbles lightly to prevent overcooking.", "c": "Saute is to cook in a small amount of fat, turn and brown on each side with less fat than frying.", "d": "Broil is to cook by exposing food to intense direct heat, as beneath the broiler unit of a range or over charcoal.", "correct": "B"}, {"n": 65, "q": "When must cabin crew responsible for galley work complete the stock control in Service on Board Report?", "a": "Every sector", "b": "Before landing in BKK and at crew change station", "c": "After landing in BKK and at crew change station", "d": "Before landing in BKK only", "correct": "B"}, {"n": 66, "q": "What is the non-strict vegetarian meal that is prepared with dairy products and does not contain any type of fish or meat? (SI/ October 2025)", "a": "Vegetarian Lacto-Ovo Meal", "b": "Vegetarian Jain Meal", "c": "Vegetarian Vegan Meal", "d": "Asian Vegetarian Meal", "correct": "A"}, {"n": 67, "q": "What is the recommended serving temperature for white wine?", "a": "7-10 degree celcius", "b": "10-13 degree celcius", "c": "13-15 degree celcius", "d": "16-18 degree celcius", "correct": "A"}, {"n": 68, "q": "Which ingredient is added as a garnish to NEGRONI SBAGLIATO?", "a": "Lemon Slice", "b": "Pansy Flower", "c": "Orange Slice", "d": "No Garniture Added", "correct": "C"}, {"n": 69, "q": "Which types of alcoholic beverages are produced through the distillation process?", "a": "Beer and Wine", "b": "Cognac and Whisky", "c": "Beer and Whisky", "d": "Wine and Cognac", "correct": "B"}, {"n": 70, "q": "Which one is NOT an ingredient of Kalimotxo?", "a": "Port Wine", "b": "Coca Cola", "c": "Italian Red Wine", "d": "Orange Slice", "correct": "A"}, {"n": 71, "q": "What is Ragda Patties? (MLP)", "a": "Mushroom with green pea", "b": "Mustard seed and curry", "c": "Potato and pea", "d": "Red bean with onion", "correct": "C"}, {"n": 72, "q": "Which Barista menu is currently available on board?", "a": "Cold brew coffee", "b": "Espresso with orange juice", "c": "Thai iced tea with grass jelly", "d": "Coffee latte with coffee jelly", "correct": "C"}, {"n": 73, "q": "What is Kachumber Salad?", "a": "Green capsicum, green pea, paneer and carrot cooked with masala sauce", "b": "Indian Basmati rice with cumin seed", "c": "Potato with chopped spring onion", "d": "Capsicum and cucumber with chaat masala", "correct": "D"}, {"n": 74, "q": "Which syrup is used in making RRV?", "a": "Lemongrass", "b": "Rose", "c": "Lychee", "d": "Pansy", "correct": "B"}, {"n": 75, "q": "Which item is made from buckwheat flour?", "a": "Udon", "b": "Soba", "c": "Vermicelli", "d": "Ramen", "correct": "B"}, {"n": 76, "q": "Which cocktail is NOT served in Thai Airways economy class?", "a": "Whiskey Highball", "b": "Kalimotxo", "c": "Gin and Tonic", "d": "Legacy Reborn", "correct": "D"}, {"n": 77, "q": "Which type of meat is permissible in Hindu cuisine?", "a": "Lamb, Goat, Chicken and Fish", "b": "Beef, Prawn, Lamb and Chicken", "c": "Mutton, Lamb, Chicken and Beef", "d": "Fish, Goat, Beef and Lamb", "correct": "A"}, {"n": 78, "q": "Which of the following fish is a type of freshwater fish?", "a": "Mackerel", "b": "Grouper", "c": "Sole", "d": "Trout", "correct": "D"}, {"n": 79, "q": "Which sauce is made from bechamel enriched with grated cheese, egg yolk, mustard and cream?", "a": "Cardinal", "b": "Mornay", "c": "Soubise", "d": "Remoulade", "correct": "B"}, {"n": 80, "q": "What kind of coffee is made by pouring steamed milk into freshly brewed espresso until the cup is about three-quarters full, then topping it up with frothed milk?", "a": "Espresso", "b": "Cappuccino", "c": "Latte", "d": "Macchiato", "correct": "C"}, {"n": 81, "q": "Which type of tea is made from fresh leaves that are dried immediately after picking, thus stopping oxidation and inactivating enzymes, resulting in a light greenish-yellow color?", "a": "Earl grey", "b": "English Breakfast tea", "c": "Camomile", "d": "Japanese Green tea", "correct": "D"}, {"n": 82, "q": "What kind of coffee is made from espresso, steamed milk and milk foam in equal parts?", "a": "Espresso", "b": "Macchiato", "c": "Cappuccino", "d": "Cafe au lait", "correct": "C"}];
const IS_HARD = false;
const SUBJECT_CODE = 'QBB';
const SUBJECT_NAME = 'Set D';
const PASSWORD = 'mheenoeysusu';
const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzw8A3zMTTAuZQ0f4nf61enc-99OlnHg36D9gDUzKHxR2Z6HdL6sJWUtPiyF5QUy98mTg/exec';

let userName = '';
let order = [];
let cur = 0;
let correctCount = 0;
let wrongCount = 0;
let answered = false;
let startTime = null;
let wrongAnswers = []; // {q, userAnswer, correctAnswer}

function $(id) { return document.getElementById(id); }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// LOGIN SCREEN
function renderLogin() {
  $('content').innerHTML = `
    <div class="login-screen">
      <div class="emoji">✈️</div>
      <h2>เข้าสู่ระบบ</h2>
      <div class="desc">กรอกข้อมูลก่อนเริ่มทำแบบทดสอบ</div>
      <div class="login-form">
        <input type="text" id="loginName" placeholder="ชื่อเล่น" autocomplete="nickname" />
        <input type="password" id="loginPass" placeholder="รหัสผ่าน" />
        <div class="error" id="loginErr"></div>
        <button class="btn btn-primary" onclick="tryLogin()">เริ่มทำแบบทดสอบ →</button>
      </div>
    </div>`;
  $('totalQ').textContent = QUESTIONS.length;
  // allow Enter key
  ['loginName','loginPass'].forEach(id => {
    $(id).addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
  });
  $('loginName').focus();
}

function tryLogin() {
  const name = $('loginName').value.trim();
  const pass = $('loginPass').value;
  const err = $('loginErr');
  if (!name) { err.textContent = 'กรุณากรอกชื่อเล่น'; return; }
  if (name.length < 2) { err.textContent = 'ชื่อเล่นต้องมีอย่างน้อย 2 ตัวอักษร'; return; }
  if (pass !== PASSWORD) { err.textContent = 'รหัสผ่านไม่ถูกต้อง'; return; }
  userName = name;
  startQuiz();
}

// QUIZ
function startQuiz() {
  order = shuffle(QUESTIONS.map((_, i) => i));
  cur = 0;
  correctCount = 0;
  wrongCount = 0;
  wrongAnswers = [];
  startTime = Date.now();
  renderQuizFrame();
  renderQuestion();
}

function renderQuizFrame() {
  $('content').innerHTML = `
    <div class="stats">
      <div class="stat"><div class="num" id="curNum">0</div><div class="label">ข้อ</div></div>
      <div class="stat"><div class="num correct" id="correctNum">0</div><div class="label">ถูก</div></div>
      <div class="stat"><div class="num wrong" id="wrongNum">0</div><div class="label">ผิด</div></div>
      <div class="stat"><div class="num" id="scoreNum">0%</div><div class="label">คะแนน</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    </div>
    <main id="mainArea"></main>`;
}

function updateStats() {
  $('curNum').textContent = cur + 1;
  $('correctNum').textContent = correctCount;
  $('wrongNum').textContent = wrongCount;
  const total = correctCount + wrongCount;
  const pct = total === 0 ? 0 : Math.round((correctCount / total) * 100);
  $('scoreNum').textContent = pct + '%';
  $('progFill').style.width = ((cur) / QUESTIONS.length * 100) + '%';
}

function renderQuestion() {
  if (cur >= QUESTIONS.length) { renderEnd(); return; }
  answered = false;
  const q = QUESTIONS[order[cur]];
  updateStats();
  const subjTag = (IS_HARD && q.subject) ? `<span class="subj-tag">${escapeHtml(q.subject.split('_')[0].replace('QAB','A').replace('QAC','B').replace('QBA','C').replace('QBB','D'))}</span>` : '';
  const qNumCls = IS_HARD ? 'qnum hard' : 'qnum';
  $('mainArea').innerHTML = `
    <div class="question-card">
      <div>
        <span class="${qNumCls}">ข้อ ${cur + 1} / ${QUESTIONS.length}</span>
        ${subjTag}
      </div>
      <div class="question" style="margin-top: 12px;">${escapeHtml(q.q)}</div>
      <div class="choices">
        ${['A','B','C','D'].map(letter => `
          <button class="choice" data-letter="${letter}" onclick="selectAnswer('${letter}')">
            <span class="letter">${letter}</span>
            <span>${escapeHtml(q[letter.toLowerCase()])}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="controls">
        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" disabled>${cur === QUESTIONS.length - 1 ? 'ดูผลรวม →' : 'ข้อถัดไป →'}</button>
        <button class="btn btn-secondary" onclick="restartQuiz()">เริ่มใหม่</button>
      </div>
    </div>`;
}

function selectAnswer(letter) {
  if (answered) return;
  answered = true;
  const q = QUESTIONS[order[cur]];
  const isCorrect = letter === q.correct;
  if (isCorrect) {
    correctCount++;
  } else {
    wrongCount++;
    wrongAnswers.push({
      q: q,
      userAnswer: letter,
      correctAnswer: q.correct,
      qIdx: cur + 1
    });
  }
  document.querySelectorAll('.choice').forEach(btn => {
    btn.disabled = true;
    const l = btn.dataset.letter;
    if (l === q.correct) btn.classList.add('correct');
    else if (l === letter) btn.classList.add('wrong');
  });
  const fb = $('feedback');
  const correctText = q[q.correct.toLowerCase()];
  if (isCorrect) {
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>✓ ถูกต้อง!</strong>คำตอบ: ${q.correct}. ${escapeHtml(correctText)}`;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>✗ ผิด</strong>คำตอบที่ถูก: ${q.correct}. ${escapeHtml(correctText)}`;
  }
  $('nextBtn').disabled = false;
  updateStats();
}

function nextQuestion() { cur++; renderQuestion(); }

function restartQuiz() {
  if (confirm('เริ่มใหม่และสุ่มลำดับข้อใหม่?')) startQuiz();
}

function renderEnd() {
  updateStats();
  $('progFill').style.width = '100%';
  const total = QUESTIONS.length;
  const pct = Math.round((correctCount / total) * 100);
  const duration = Math.round((Date.now() - startTime) / 1000);
  let msg, emoji, memeFile;
  if (pct >= 100) { msg = 'BC is calling เต็ม100ได้100 เออ เริ่ด!!!'; emoji = '🏆'; memeFile = 'meme-100.jpg'; }
  else if (pct >= 95) { msg = 'ตัวเเม่ตัวมัมตัวBCมาก เจ๋งแจ่มแจ๋ว'; emoji = '🎉'; memeFile = 'meme-95.jpg'; }
  else if (pct >= 90) { msg = 'หลบหน่อย คนสวยจะเป็นพี่BCเด้อ'; emoji = '🎉'; memeFile = 'meme-90.jpg'; }
  else if (pct >= 80) { msg = 'ผ่านล่ะแม่ ดีจุยด้วย'; emoji = '🎉'; memeFile = 'meme-80.jpg'; }
  else { msg = 'อ่านใหม่ก่อนๆคุณแม่'; emoji = '💪'; memeFile = 'meme-0.jpg'; }
  const memeCaption = emoji + ' ' + msg;
  const memeHtml = `<div class="meme-box"><img src="${memeFile}" alt="meme" onerror="this.parentElement.style.display='none'"></div>`;
  
  const wrongHtml = wrongAnswers.length === 0
    ? `<div class="no-wrong">🌟 ตอบถูกทุกข้อ! ไม่มีข้อให้ทบทวน</div>`
    : `<div class="wrong-list">
        <h3>ข้อที่ตอบผิด (${wrongAnswers.length} ข้อ) — ทบทวนเฉลย</h3>
        ${wrongAnswers.map(w => {
          const correctText = w.q[w.correctAnswer.toLowerCase()];
          const userText = w.q[w.userAnswer.toLowerCase()];
          const subjTag = (IS_HARD && w.q.subject) ? `<span class="wq-subj">${escapeHtml(w.q.subject.split('_')[0].replace('QAB','A').replace('QAC','B').replace('QBA','C').replace('QBB','D'))}</span>` : '';
          return `
            <div class="wrong-item">
              <div class="wq">
                <span class="wq-num">ลำดับที่ ${w.qIdx}</span>${subjTag}
                ${escapeHtml(w.q.q)}
              </div>
              <div class="ans-row your-ans">✗ คุณตอบ: ${w.userAnswer}. ${escapeHtml(userText)}</div>
              <div class="ans-row correct-ans">✓ เฉลย: ${w.correctAnswer}. ${escapeHtml(correctText)}</div>
            </div>
          `;
        }).join('')}
      </div>`;
  
  $('content').innerHTML = `
    <div class="end-screen">
      <div class="end-header">
        <div class="big-emoji">${emoji}</div>
        <h2>${msg}</h2>
        <div class="name">${escapeHtml(userName)} • ใช้เวลา ${duration} วินาที</div>
        <div class="end-score">${correctCount} / ${total}</div>
        <div class="end-pct">${pct}%</div>
      </div>
      ${memeHtml}
      <div id="syncStatus" class="sync-status pending">⏳ กำลังบันทึกคะแนน...</div>
      ${wrongHtml}
      <div class="controls" style="justify-content: center; margin-top: 28px;">
        <button class="btn btn-primary" onclick="restartQuiz()">ทำใหม่ (สุ่มข้อใหม่)</button>
        <a class="btn btn-secondary" href="index.html" style="text-decoration: none; display: inline-flex; align-items: center;">เลือกวิชาอื่น</a>
      </div>
    </div>`;
  
  // Send score to Google Sheet
  submitScore(correctCount, total, pct, duration);
}

function submitScore(score, total, percent, duration) {
  const statusEl = $('syncStatus');
  const payload = {
    name: userName,
    subject: SUBJECT_NAME,
    score: score,
    total: total,
    percent: percent,
    duration: duration
  };
  // Use no-cors mode — Apps Script accepts text/plain without preflight
  fetch(WEBAPP_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'text/plain;charset=utf-8'},
    body: JSON.stringify(payload)
  }).then(() => {
    if (statusEl) {
      statusEl.className = 'sync-status ok';
      statusEl.innerHTML = '✓ บันทึกคะแนนเรียบร้อย';
    }
  }).catch(err => {
    if (statusEl) {
      statusEl.className = 'sync-status err';
      statusEl.innerHTML = '⚠️ บันทึกคะแนนไม่สำเร็จ (ตรวจอินเทอร์เน็ต)';
    }
    console.error('Submit error:', err);
  });
}

// Start
renderLogin();
</script>
